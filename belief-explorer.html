<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Belief Database</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root{
  --bg-grad: radial-gradient(ellipse 110% 80% at 50% 35%, #1c2742 0%, #131a2e 50%, #0a1020 100%);
  --accent:#7fd9ff; --accent2:#ffc472; --accentOp:#ff6a8a;
  --text:#dbe7ff; --textDim:#7d8db3;
  --panelBg:rgba(8,13,28,0.78); --panelBd:rgba(127,217,255,0.18); --chipBg:rgba(127,217,255,0.10);
  --row:rgba(127,217,255,0.03); --rowHover:rgba(127,217,255,0.07);
  --fontDisplay:'Space Grotesk',system-ui,sans-serif; --fontBody:'Inter',system-ui,sans-serif; --fontMono:'JetBrains Mono',ui-monospace,monospace;
  /* source-register colors (match the 3D map's category palette) */
  --reg-A:#ff6f9c; --reg-B:#b98bff; --reg-C:#34d399; --reg-D:#4eb3ff; --reg-E:#f5d76e; --reg-x:#9aa7c7;
  --c-LOW:#34d399; --c-MIXED:#ffc472; --c-REVIEW:#4eb3ff; --c-HIGH:#ff6a8a; --c-UNKNOWN:#9aa7c7;
  /* STANCES.md compliance names (CLEAN/MIXED/COUNSEL) alongside the legacy reference-build set */
  --c-CLEAN:#34d399; --c-COUNSEL:#ff6a8a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#0a1020;color:var(--text);font-family:var(--fontBody);overflow:hidden}
body{display:flex;flex-direction:column;background:var(--bg-grad)}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--panelBd);border-radius:4px}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:16px;padding:16px 18px;flex:0 0 auto}
.brand{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--panelBg);border:1px solid var(--panelBd);border-radius:12px;backdrop-filter:blur(14px);flex-shrink:0}
.logo{color:var(--accent);display:flex}
.b-title{font-family:var(--fontDisplay);font-size:15px;font-weight:600;line-height:1.2}
.b-sub{font-family:var(--fontMono);font-size:10px;color:var(--textDim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.search{position:relative;flex:1 1 auto;max-width:440px;min-width:160px}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--textDim)}
.search input{width:100%;padding:12px 14px 12px 38px;background:var(--panelBg);border:1px solid var(--panelBd);border-radius:12px;color:var(--text);font:inherit;font-size:13px;outline:none;backdrop-filter:blur(14px)}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(127,217,255,.13)}
.search input::placeholder{color:var(--textDim)}
.viewtoggle{display:flex;background:var(--panelBg);border:1px solid var(--panelBd);border-radius:12px;padding:4px;backdrop-filter:blur(14px);flex-shrink:0}
.viewtoggle button{font:inherit;font-size:12.5px;color:var(--textDim);background:transparent;border:0;padding:8px 16px;border-radius:9px;cursor:pointer;display:flex;gap:7px;align-items:center}
.viewtoggle button.on{background:rgba(127,217,255,.12);color:var(--accent)}
.counter{margin-left:auto;font-family:var(--fontMono);font-size:10.5px;color:var(--textDim);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;padding:12px 14px;background:var(--panelBg);border:1px solid var(--panelBd);border-radius:12px;backdrop-filter:blur(14px)}
.counter b{color:var(--text);font-weight:500}
.nav-map{font-family:var(--fontMono);font-size:11px;color:var(--textDim);padding:12px 14px;border:1px solid var(--panelBd);border-radius:12px;background:var(--panelBg);backdrop-filter:blur(14px);flex-shrink:0}
.nav-map:hover{color:var(--accent);border-color:var(--accent)}

/* ── Filter rail ── */
.filters{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;padding:0 18px 14px}
.fgroup{display:flex;align-items:center;gap:6px}
.flabel{font-family:var(--fontMono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--textDim);margin-right:2px}
.chip{font-family:var(--fontMono);font-size:10.5px;padding:5px 10px;border-radius:7px;border:1px solid var(--panelBd);background:transparent;color:var(--textDim);cursor:pointer;user-select:none;white-space:nowrap;transition:all .12s}
.chip:hover{background:var(--chipBg)}
.chip.on{color:#06121f;background:var(--accent);border-color:var(--accent);font-weight:600}
.chip.dotc{display:inline-flex;align-items:center;gap:6px}
.chip .cd{width:7px;height:7px;border-radius:50%;display:inline-block}
.chip.on .cd{box-shadow:0 0 0 2px rgba(6,18,31,.4)}

/* ── Table ── */
.tablewrap{flex:1 1 auto;overflow:auto;margin:0 18px 14px;border:1px solid var(--panelBd);border-radius:14px;background:rgba(8,13,28,.55);backdrop-filter:blur(14px)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;z-index:2;background:#0d1424;color:var(--textDim);font-family:var(--fontMono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;text-align:left;font-weight:500;padding:12px 12px;border-bottom:1px solid var(--panelBd);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--text)}
thead th .arr{opacity:.5;font-size:9px;margin-left:3px}
tbody td{padding:11px 12px;border-bottom:1px solid rgba(127,217,255,.06);vertical-align:top}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:nth-child(even){background:var(--row)}
tbody tr:hover{background:var(--rowHover)}
.b-name{font-family:var(--fontDisplay);font-weight:600;font-size:13.5px;color:var(--text);line-height:1.25}
.b-gloss{color:var(--textDim);font-size:11px;margin-top:3px;line-height:1.35}
.sector-tag{font-family:var(--fontMono);font-size:10px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.sector-tag .sd{width:8px;height:8px;border-radius:50%}
/* score bars */
.bar{position:relative;width:84px;height:6px;background:rgba(127,217,255,.10);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.bar i{position:absolute;left:0;top:0;height:100%;border-radius:3px}
.bar.freq i{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.bar.conv i{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
.barv{font-family:var(--fontMono);font-size:11px;color:var(--text);margin-left:8px}
.divflag{font-family:var(--fontMono);font-size:9.5px;color:var(--textDim);margin-top:4px}
.pill{font-family:var(--fontMono);font-size:9.5px;font-weight:600;letter-spacing:.04em;padding:3px 8px;border-radius:5px;white-space:nowrap;display:inline-block}
.tier-1{background:rgba(127,217,255,.16);color:var(--accent)} .tier-2{background:rgba(255,196,114,.16);color:var(--accent2)} .tier-3{background:rgba(255,106,138,.16);color:var(--accentOp)} .tier-null{background:rgba(154,167,199,.12);color:var(--textDim)}
.comp{font-family:var(--fontMono);font-size:9.5px;font-weight:600;padding:3px 8px;border-radius:5px;display:inline-block}
.evnum{font-family:var(--fontMono);font-size:13px;color:var(--text)} .evsub{font-family:var(--fontMono);font-size:9.5px;color:var(--textDim)}
.flagchip{font-family:var(--fontMono);font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid;display:inline-block;margin-right:4px}
.flag-av{color:var(--accent2);border-color:rgba(255,196,114,.4);background:rgba(255,196,114,.08)}
.flag-cs{color:var(--accentOp);border-color:rgba(255,106,138,.4);background:rgba(255,106,138,.08)}
.flag-pv{color:#c9a4ff;border-color:rgba(201,164,255,.45);background:rgba(201,164,255,.12)}
.onmap{display:inline-flex;align-items:center;gap:7px;font-family:var(--fontMono);font-size:10.5px}
.onmap .dot{width:9px;height:9px;border-radius:50%}
.onmap.yes .dot{background:var(--accent);box-shadow:0 0 8px var(--accent)} .onmap.no .dot{background:transparent;border:1px solid var(--textDim)}
.onmap .mc{color:var(--text)} .onmap .mn{color:var(--textDim);font-size:9.5px}
.qtext{font-size:13px;line-height:1.5;color:var(--text);max-width:640px}
.qtext .ctx{color:var(--textDim);font-style:italic;font-size:11px}
.src{font-family:var(--fontMono);font-size:10.5px;color:var(--textDim);white-space:nowrap}
.regdot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}
td.qcell{border-left:3px solid transparent}

/* ── Detail drawer ── */
.drawer{position:fixed;top:0;right:0;height:100%;width:480px;max-width:92vw;background:var(--panelBg);border-left:1px solid var(--panelBd);backdrop-filter:blur(18px);transform:translateX(105%);transition:transform .26s cubic-bezier(.2,.7,.2,1);z-index:30;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.dr-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--panelBd)}
.dr-crumb{font-family:var(--fontMono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--textDim)}
.dr-close{background:transparent;border:0;color:var(--textDim);font-size:22px;cursor:pointer;line-height:1}
.dr-close:hover{color:var(--text)}
.dr-body{flex:1;overflow-y:auto;padding:18px 22px}
.dr-kind{font-family:var(--fontMono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.dr-title{font-family:var(--fontDisplay);font-size:22px;font-weight:600;line-height:1.25}
.dr-headline{font-family:var(--fontDisplay);font-style:italic;font-size:15px;color:var(--text);opacity:.95;margin-top:8px;line-height:1.4}
.dr-def{font-size:13px;line-height:1.55;color:var(--textDim);margin-top:10px}
.dr-scores{display:flex;gap:10px;margin-top:16px}
.scorecard{flex:1;padding:10px 12px;border:1px solid var(--panelBd);border-radius:10px;text-align:center}
.scorecard .lab{font-family:var(--fontMono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--textDim)}
.scorecard .val{font-family:var(--fontDisplay);font-size:24px;font-weight:600;margin-top:4px}
.scorecard .rk{font-family:var(--fontMono);font-size:9px;color:var(--textDim)}
.dr-sec{margin-top:22px}
.dr-lab{font-family:var(--fontMono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--textDim);margin-bottom:9px}
.vbox{font-size:13px;line-height:1.6;padding:12px 14px;border-radius:0 8px 8px 0}
.vbox.lic{background:rgba(52,211,153,.06);border-left:3px solid var(--c-LOW)}
.vbox.forb{background:rgba(255,106,138,.06);border-left:3px solid var(--accentOp)}
.trigs{display:flex;flex-wrap:wrap;gap:6px}
.trig{font-family:var(--fontMono);font-size:11px;padding:5px 10px;border-radius:6px;background:var(--chipBg);border:1px solid var(--panelBd);color:var(--text)}
.saying{font-family:var(--fontMono);font-size:11px;padding:5px 10px;border-radius:6px;background:rgba(255,196,114,.08);border:1px solid rgba(255,196,114,.3);color:var(--accent2);margin:0 6px 6px 0;display:inline-block}
.qrow{padding:11px 13px;border:1px solid var(--panelBd);border-radius:8px;margin-bottom:7px;border-left:3px solid var(--accent)}
.qrow .qm{display:flex;gap:8px;align-items:center;font-family:var(--fontMono);font-size:9.5px;color:var(--textDim);margin-bottom:6px;flex-wrap:wrap}
.qrow .qq{font-size:12.5px;line-height:1.5;color:var(--text)}
.qrow.hl{border-left-color:var(--accent2);background:rgba(255,196,114,.04)}
.starbadge{font-family:var(--fontMono);font-size:8.5px;color:var(--accent2);border:1px solid rgba(255,196,114,.4);padding:1px 5px;border-radius:4px}
.compnote{font-size:12px;line-height:1.5;color:var(--text);padding:10px 12px;background:rgba(255,106,138,.05);border-left:2px solid var(--accentOp);border-radius:0 6px 6px 0}
.dr-quote-big{font-family:var(--fontDisplay);font-size:19px;font-weight:500;line-height:1.45;padding:16px 18px;background:rgba(127,217,255,.05);border-left:3px solid var(--accent);border-radius:0 8px 8px 0}
.gotobelief{width:100%;justify-content:center;margin-top:8px;display:flex;align-items:center;gap:8px;padding:12px;background:rgba(255,196,114,.12);border:1px solid rgba(255,196,114,.3);color:var(--accent2);border-radius:10px;cursor:pointer;font:inherit;font-size:12.5px}

/* ── Footer ── */
.foot{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:10px 20px;font-family:var(--fontMono);font-size:10.5px;color:var(--textDim);border-top:1px solid var(--panelBd)}
.foot .legend{display:flex;gap:12px;flex-wrap:wrap}
.foot .lg{display:inline-flex;align-items:center;gap:5px}
.foot .lg i{width:8px;height:8px;border-radius:2px;display:inline-block}
.exportbtn{margin-left:auto;font:inherit;font-size:11px;color:var(--accent);background:rgba(127,217,255,.1);border:1px solid rgba(127,217,255,.25);padding:7px 14px;border-radius:8px;cursor:pointer}
.exportbtn:hover{background:rgba(127,217,255,.18)}
.empty{padding:60px;text-align:center;color:var(--textDim);font-family:var(--fontMono);font-size:12px}
@media(max-width:900px){.b-sub,.foot .legend{display:none}.drawer{width:100%}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 3"/><circle cx="20" cy="6" r="1.2" fill="currentColor"/><circle cx="4" cy="18" r="1.2" fill="currentColor"/><circle cx="19" cy="19" r="1" fill="currentColor"/><line x1="12" y1="12" x2="20" y2="6"/><line x1="12" y1="12" x2="4" y2="18"/><line x1="12" y1="12" x2="19" y2="19"/></svg></div>
      <div><div class="b-title" id="brandName">Belief Database</div><div class="b-sub" id="brandSub">Belief Database</div></div>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="6"/><path d="M20 20l-3.5-3.5"/></svg>
      <input id="q" type="text" placeholder="Search beliefs, quotes, sources…" />
    </div>
    <div class="viewtoggle">
      <button id="vBeliefs" class="on">◆ Beliefs</button>
      <button id="vQuotes">❝ Quotes</button>
    </div>
    <a class="nav-map" id="navMap" href="belief-map.html" title="Open the 3D belief field">◇ Map</a>
    <span class="counter" id="counter"></span>
  </div>

  <div class="filters" id="filters"></div>

  <div class="tablewrap"><div id="table"></div></div>

  <div class="foot">
    <span id="footcount"></span>
    <div class="legend" id="legend"></div>
    <span style="color:var(--textDim)" title="Active = recency boost from the newest evidence date: full under 30 days, -10% per 30 days, normal at 300 days">● Active = talked about recently (full &lt;30d, fades 10%/30d)</span>
    <button class="exportbtn" id="export">⤓ Export CSV</button>
  </div>

  <div class="drawer" id="drawer">
    <div class="dr-head"><span class="dr-crumb" id="drCrumb"></span><button class="dr-close" id="drClose">×</button></div>
    <div class="dr-body" id="drBody"></div>
  </div>

<script src="data/belief-db.js"></script>
<script>window.MAP_HREF="index.html"</script>
<script>
(function(){
  const DB = window.BELIEF_DB;
  if(!DB){document.getElementById('table').innerHTML='<div class="empty">Could not load data/belief-db.js. Open this page over a server or alongside its data folder.</div>';return;}
  // ── Subject-agnostic chrome: title + brand come from the data, the map link
  //    from an optional per-deploy override (window.MAP_HREF), so this file is
  //    a universal replica synced from the platform — never edited per subject.
  const SUBJ = DB.subject || {};
  if(SUBJ.name){
    document.title = `Belief Database · ${SUBJ.name}`;
    document.getElementById('brandName').textContent = SUBJ.name;
    document.getElementById('brandSub').textContent = 'Belief Database' + (SUBJ.role ? ` · ${SUBJ.role}` : '');
  }
  if(window.MAP_HREF) document.getElementById('navMap').href = window.MAP_HREF;
  const beliefs = DB.beliefs, byId = Object.fromEntries(beliefs.map(b=>[b.id,b]));
  // Normalize name/gloss semantics (reference builds disagree on which field holds the
  // internal theme CODE): the display name is always the human-readable one; the code
  // renders as the small badge line, never as the belief label.
  const codeLike = t => !!t && t === t.toUpperCase() && /[A-Z]/.test(t);
  beliefs.forEach(b => {
    if (codeLike(b.name) && b.gloss && !codeLike(b.gloss)) {
      const human = b.gloss.charAt(0).toUpperCase() + b.gloss.slice(1);
      b._code = b.name; b.name = human; b.gloss = b._code;
    }
  });
  // ── Recency salience (matches the 3D map's curve exactly) ──
  // Beliefs talked about recently read stronger: full boost when the newest
  // evidence is under 30 days old, decaying 10% per 30 days to baseline
  // (normal at 300 days; nothing older than 365 days is boosted). Computed at
  // render time from per-quote dates. Date precision: YYYY-MM-DD exact,
  // YYYY-MM mid-month, YYYY mid-year clamped to today.
  const NOW_MS = Date.now();
  function parseQuoteDate(s){
    const m=/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/.exec((s||'').trim());
    if(!m) return null;
    const y=+m[1]; if(y<1990||y>2100) return null;
    const mo=m[2]?+m[2]-1:6, d=m[3]?+m[3]:(m[2]?15:1);
    return Math.min(new Date(y,mo,d).getTime(), NOW_MS);
  }
  function recencyBoost(t){
    if(t==null) return 0;
    const days=(NOW_MS-t)/86400000;
    if(days>365) return 0;
    return Math.max(0, Math.min(1, 1-0.10*Math.floor(days/30)));
  }
  beliefs.forEach(b=>{
    let newest=null;
    [].concat(b.highlights||[], b.quotes||[]).forEach(q=>{
      const t=parseQuoteDate(q.date);
      if(t!=null && (newest==null||t>newest)) newest=t;
    });
    b._newest=newest;
    b._recency=recencyBoost(newest);
  });
  const fmtDate=t=>t==null?'—':new Date(t).toISOString().slice(0,10);
  function recencyChip(rb,t){
    if(!rb) return '<span class="src" style="opacity:.45">—</span>';
    const days=Math.floor((NOW_MS-t)/86400000);
    const hot=rb>=0.9;
    return `<span class="flagchip" style="color:${hot?'#7fffd4':'var(--accent)'};border-color:${hot?'rgba(127,255,212,.5)':'rgba(127,217,255,.35)'};${hot?'font-weight:600;':''}" title="Newest evidence ${days}d ago · boost ${Math.round(rb*100)}% (full <30d, -10% per 30d, normal at 300d)">${hot?'● ':''}${days}d · ${Math.round(rb*100)}%</span>`;
  }
  // Domain sectors + each belief's domain come straight from the data (includes the AI sector).
  const SECTORS = DB.sectors || [
    {id:'crypto',name:'Cryptocurrency & Digital Assets',hue:0.58},
    {id:'ai',name:'AI & Agentic Banking',hue:0.42},
    {id:'gov',name:'Government, Policy & Regulation',hue:0.97},
    {id:'natl',name:'National & American Identity',hue:0.04},
    {id:'philo',name:'Worldview & Philosophy',hue:0.82},
    {id:'biz',name:'Anchorage Brand & Company',hue:0.5},
    {id:'self',name:'Personal & Biographical',hue:0.13},
  ];
  function secOf(b){return b.domain||'philo';}
  function secColor(sid){const s=SECTORS.find(x=>x.id===sid)||SECTORS[3];return `hsl(${s.hue*360},65%,62%)`;}
  const REGCOLOR={A:'var(--reg-A)',B:'var(--reg-B)',C:'var(--reg-C)',D:'var(--reg-D)',E:'var(--reg-E)','':'var(--reg-x)'};
  const REGNAME=DB.register_legend||{};
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  // ── State ──
  const state={view:'beliefs',q:'',sectors:new Set(),tiers:new Set(),comps:new Set(),avOnly:false,onmapOnly:false,
    bsort:{key:'conviction',dir:-1}, qsort:{key:'_resonance',dir:-1}};

  // ── Filter rail ──
  function buildFilters(){
    const el=document.getElementById('filters');
    const sectorChips=SECTORS.map(s=>`<button class="chip dotc" data-f="sector" data-v="${s.id}"><span class="cd" style="background:${secColor(s.id)}"></span>${esc(s.name.split(' ')[0])}</button>`).join('');
    const tierChips=[['1','Core'],['2','News-spike'],['3','Deep-quiet'],['null','Untiered']].map(([v,l])=>`<button class="chip" data-f="tier" data-v="${v}">${l}</button>`).join('');
    // Compliance is inert metadata at this stage (Jarred, 2026-06-10): no filter toggle.
    el.innerHTML=`<div class="fgroup"><span class="flabel">Sector</span>${sectorChips}</div>
      <div class="fgroup"><span class="flabel">Tier</span>${tierChips}</div>
      <div class="fgroup"><button class="chip" data-f="av">⚑ Audio-verify only</button><button class="chip" data-f="onmap">◉ On-map only</button></div>`;
    el.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
      const f=c.dataset.f,v=c.dataset.v;
      if(f==='av'){state.avOnly=!state.avOnly;c.classList.toggle('on',state.avOnly);}
      else if(f==='onmap'){state.onmapOnly=!state.onmapOnly;c.classList.toggle('on',state.onmapOnly);}
      else{const set=f==='sector'?state.sectors:f==='tier'?state.tiers:state.comps;
        if(set.has(v))set.delete(v);else set.add(v);c.classList.toggle('on',set.has(v));}
      render();
    }));
  }

  // ── Filtering ──
  function beliefMatch(b){
    if(state.sectors.size&&!state.sectors.has(secOf(b)))return false;
    if(state.tiers.size&&!state.tiers.has(String(b.resonance.tier)))return false;
    if(state.comps.size&&!state.comps.has(b.safety.compliance_level))return false;
    if(state.avOnly&&!b.safety.audio_verify_pending)return false;
    if(state.onmapOnly&&!b.on_map.registers)return false;
    if(state.q){const q=state.q.toLowerCase();
      if(!(b.name.toLowerCase().includes(q)||(b.gloss||'').toLowerCase().includes(q)||(b.definition||'').toLowerCase().includes(q)||(b.voice.licenses||'').toLowerCase().includes(q)))return false;}
    return true;
  }
  // PRIVATE = register A quotes or any private-intake source (1:1, personality intake, private session).
  // Generic detector matching the platform sanitizer convention — internal-only, never externalize.
  const isPrivate=q=>(String(q.register||'').toUpperCase()==='A')||/intake|personality|private[ -_]?(1.?1|session)/i.test(q.source||'');
  function allQuotes(){
    const out=[];
    beliefs.forEach(b=>{
      const sec=secOf(b);
      (b.highlights||[]).forEach(q=>out.push(Object.assign({},q,{_b:b,_sec:sec,_hl:true,_private:isPrivate(q),_res:(b.resonance.frequency+b.resonance.conviction)/2})));
      (b.quotes||[]).forEach(q=>out.push(Object.assign({},q,{_b:b,_sec:sec,_hl:false,_private:isPrivate(q),_res:(b.resonance.frequency+b.resonance.conviction)/2})));
    });
    return out;
  }
  function quoteMatch(q){
    const b=q._b;
    if(state.sectors.size&&!state.sectors.has(q._sec))return false;
    if(state.tiers.size&&!state.tiers.has(String(b.resonance.tier)))return false;
    if(state.comps.size&&!state.comps.has(b.safety.compliance_level))return false;
    if(state.avOnly&&!q.audio_verify)return false;
    if(state.onmapOnly&&!b.on_map.registers)return false;
    if(state.q){const s=state.q.toLowerCase();
      if(!((q.text||'').toLowerCase().includes(s)||b.name.toLowerCase().includes(s)||(q.source||'').toLowerCase().includes(s)))return false;}
    return true;
  }

  // ── Renderers ──
  function bar(cls,v){return `<span class="bar ${cls}"><i style="width:${v}%"></i></span><span class="barv">${v}</span>`;}
  function compPill(c){return `<span class="comp" style="color:var(--c-${c});background:color-mix(in srgb, var(--c-${c}) 16%, transparent)">${c}</span>`;}
  function tierPill(t){const lab={1:'CORE',2:'NEWS-SPIKE',3:'DEEP-QUIET'}[t]||'—';return `<span class="pill tier-${t==null?'null':t}">${lab}</span>`;}
  function flags(b){let s='';if(b.safety.audio_verify_pending)s+='<span class="flagchip flag-av" title="Has transcript-only quotes needing audio-verify before external use">AV</span>';return s;}

  function renderBeliefs(){
    const rows=beliefs.filter(beliefMatch);
    const k=state.bsort.key,d=state.bsort.dir;
    const get={name:b=>b.name,sector:b=>secOf(b),tier:b=>b.resonance.tier||99,recency:b=>b._recency||0,frequency:b=>b.resonance.frequency,conviction:b=>b.resonance.conviction,evidence:b=>b.evidence_count,compliance:b=>['LOW','MIXED','REVIEW','HIGH','UNKNOWN'].indexOf(b.safety.compliance_level),onmap:b=>b.on_map.registers?(b.on_map.map_quote_count||1):-1};
    rows.sort((a,b)=>{const x=get[k](a),y=get[k](b);return (x<y?-1:x>y?1:0)*d;});
    const head=[['name','Belief'],['sector','Sector'],['tier','Tier'],['recency','Active'],['frequency','Freq'],['conviction','Conviction'],['evidence','Evidence'],['compliance','Compliance'],['onmap','On map']];
    let html='<table><thead><tr>'+head.map(([key,lab])=>`<th data-sort="${key}">${lab}${k===key?`<span class="arr">${d<0?'▼':'▲'}</span>`:''}</th>`).join('')+'</tr></thead><tbody>';
    rows.forEach(b=>{
      const sec=secOf(b);
      const rb=b._recency||0;
      const nameStyle=rb?`style="font-weight:${rb>=0.9?700:600};color:#fff;text-shadow:0 0 ${Math.round(10*rb)}px rgba(127,217,255,${(0.55*rb).toFixed(2)})"`:'';
      html+=`<tr data-belief="${b.id}">
        <td><div class="b-name" ${nameStyle}>${esc(b.name)}</div><div class="b-gloss">${esc(b.gloss)}</div></td>
        <td><span class="sector-tag"><span class="sd" style="background:${secColor(sec)}"></span>${esc((SECTORS.find(s=>s.id===sec)||{}).name.split(' ')[0])}</span></td>
        <td>${tierPill(b.resonance.tier)}<div class="divflag">${esc(b.resonance.category||'')}</div></td>
        <td>${recencyChip(rb,b._newest)}</td>
        <td>${bar('freq',b.resonance.frequency)}</td>
        <td>${bar('conv',b.resonance.conviction)}</td>
        <td><span class="evnum">${b.evidence_count}</span> <span class="evsub">${flags(b)}</span><div class="evsub">${b.quotes.length} quotes · ${b.highlights.length}★</div></td>
        <td>${compPill(b.safety.compliance_level)}${b.safety.has_sensitive_quotes?` <span class="flagchip flag-cs" title="${b.safety.sensitive_quote_count} compliance-sensitive quotes sit under this belief — the headline level does not capture them">⚠ ${b.safety.sensitive_quote_count}</span>`:''}</td>
        <td><span class="onmap ${b.on_map.registers?'yes':'no'}"><span class="dot"></span>${b.on_map.registers?`<span class="mc">${b.on_map.map_quote_count}</span><span class="mn">${esc((b.on_map.core_name||'').slice(0,20))}</span>`:'<span class="mn">not on map</span>'}</span></td>
      </tr>`;
    });
    html+='</tbody></table>';
    if(!rows.length)html='<div class="empty">No beliefs match these filters.</div>';
    document.getElementById('table').innerHTML=html;
    document.getElementById('footcount').textContent=`${rows.length} of ${beliefs.length} beliefs`;
    wireSort('beliefs');
    document.querySelectorAll('#table tr[data-belief]').forEach(tr=>tr.addEventListener('click',()=>openBelief(tr.dataset.belief)));
  }

  function renderQuotes(){
    let rows=allQuotes().filter(quoteMatch);
    const k=state.qsort.key,d=state.qsort.dir;
    const get={text:q=>q.text.toLowerCase(),belief:q=>q._b.name,source:q=>q.source||'',date:q=>q.date||'',register:q=>q.register||'',_resonance:q=>q._res};
    rows.sort((a,b)=>{const x=(get[k]||get._resonance)(a),y=(get[k]||get._resonance)(b);return (x<y?-1:x>y?1:0)*d;});
    const head=[['text','Quote'],['belief','Belief'],['source','Source'],['date','Date'],['register','Reg'],['_resonance','Strength']];
    let html='<table><thead><tr>'+head.map(([key,lab])=>`<th data-sort="${key}">${lab}${k===key?`<span class="arr">${d<0?'▼':'▲'}</span>`:''}</th>`).join('')+'</tr></thead><tbody>';
    rows.slice(0,1200).forEach((q,i)=>{
      const rc=REGCOLOR[q.register]||REGCOLOR[''];
      html+=`<tr data-q="${i}">
        <td class="qcell" style="border-left-color:${rc}"><div class="qtext">${q._hl?'<span class="starbadge">★ highlight</span> ':''}${esc(q.text)} ${q.context?`<span class="ctx">${esc(q.context)}</span>`:''}
          ${q.audio_verify?'<span class="flagchip flag-av">AV</span>':''}${q.compliance_sensitive?'<span class="flagchip flag-cs">sensitive</span>':''}${q._private?'<span class="flagchip flag-pv">PRIVATE</span>':''}</div></td>
        <td><span class="sector-tag"><span class="sd" style="background:${secColor(q._sec)}"></span>${esc(q._b.name)}</span></td>
        <td class="src">${esc(q.source)}</td>
        <td class="src">${esc(q.date)}${(()=>{const rq=recencyBoost(parseQuoteDate(q.date));return rq?` <span class="flagchip" style="color:${rq>=0.9?'#7fffd4':'var(--accent)'};border-color:rgba(127,217,255,.35)" title="Recent: boost ${Math.round(rq*100)}%">${rq>=0.9?'●':'◦'}</span>`:'';})()}</td>
        <td><span class="src"><span class="regdot" style="background:${rc}"></span>${esc(q.register||'—')}</span></td>
        <td><span class="barv">${Math.round(q._res)}</span></td>
      </tr>`;
    });
    html+='</tbody></table>';
    if(!rows.length)html='<div class="empty">No quotes match these filters.</div>';
    document.getElementById('table').innerHTML=html;
    const shown=Math.min(rows.length,1200);
    document.getElementById('footcount').textContent=`${rows.length} quotes${rows.length>1200?` (showing ${shown})`:''}`;
    wireSort('quotes');
    const arr=rows;
    document.querySelectorAll('#table tr[data-q]').forEach(tr=>tr.addEventListener('click',()=>openQuote(arr[+tr.dataset.q])));
  }

  function wireSort(view){
    document.querySelectorAll('#table thead th').forEach(th=>th.addEventListener('click',()=>{
      const key=th.dataset.sort,s=view==='beliefs'?state.bsort:state.qsort;
      if(s.key===key)s.dir*=-1;else{s.key=key;s.dir=(key==='name'||key==='belief'||key==='source')?1:-1;}
      render();
    }));
  }

  // ── Drawer ──
  const drawer=document.getElementById('drawer'),drBody=document.getElementById('drBody'),drCrumb=document.getElementById('drCrumb');
  document.getElementById('drClose').addEventListener('click',()=>drawer.classList.remove('open'));
  function evChips(b){let s='';if(b.safety.audio_verify_pending)s+='<span class="flagchip flag-av">AV pending</span>';return s;}
  function quoteCard(q,hl){
    const rc=REGCOLOR[q.register]||REGCOLOR[''];
    return `<div class="qrow ${hl?'hl':''}" style="border-left-color:${hl?'var(--accent2)':rc}">
      <div class="qm">${hl?'<span class="starbadge">★ highlight</span>':''}<span><span class="regdot" style="background:${rc}"></span>${esc(REGNAME[q.register]||q.register||'—')}</span>${q.date?`<span>${esc(q.date)}</span>`:''}${q.source?`<span>${esc(q.source)}</span>`:''}${q.prompted?`<span>${q.prompted==='U'?'volunteered':'prompted'}</span>`:''}${q.audio_verify?'<span class="flagchip flag-av">AV</span>':''}${q.compliance_sensitive?'<span class="flagchip flag-cs">sensitive</span>':''}${isPrivate(q)?'<span class="flagchip flag-pv">PRIVATE</span>':''}</div>
      <div class="qq">${esc(q.text)} ${q.context?`<span class="ctx">${esc(q.context)}</span>`:''}</div>
      ${q.compliance_note&&q.compliance_sensitive?`<div class="qm" style="margin-top:6px;color:var(--accentOp)">${esc(q.compliance_note)}</div>`:''}
    </div>`;
  }
  function openBelief(id){
    const b=byId[id];if(!b)return;const sec=secOf(b);
    drCrumb.innerHTML=`<span style="color:${secColor(sec)}">${esc((SECTORS.find(s=>s.id===sec)||{}).name)}</span> › ${b.id}`;
    const r=b.resonance,sf=b.safety,v=b.voice;
    const allq=(b.highlights||[]).map(q=>quoteCard(q,true)).concat((b.quotes||[]).map(q=>quoteCard(q,false))).join('');
    drBody.innerHTML=`
      <div class="dr-kind">Belief cluster · ${r.tier_label||'untiered'}</div>
      <div class="dr-title">${esc(b.name)}</div>
      <div class="dr-headline">${esc(b.gloss)}</div>
      <div class="dr-def">${esc(b.definition)}</div>
      <div class="dr-scores">
        <div class="scorecard"><div class="lab">Frequency</div><div class="val" style="color:var(--accent)">${r.frequency}</div><div class="rk">rank ${r.frequency_rank}</div></div>
        <div class="scorecard"><div class="lab">Conviction</div><div class="val" style="color:var(--accent2)">${r.conviction}</div><div class="rk">rank ${r.conviction_rank}</div></div>
        <div class="scorecard"><div class="lab">Evidence</div><div class="val">${b.evidence_count}</div><div class="rk">${b.quotes.length}q · ${b.highlights.length}★</div></div>
        <div class="scorecard"><div class="lab">Active</div><div class="val" style="color:${b._recency?(b._recency>=0.9?'#7fffd4':'var(--accent)'):'var(--textDim)'}">${b._recency?Math.round(b._recency*100)+'%':'—'}</div><div class="rk">last ${fmtDate(b._newest)}</div></div>
      </div>
      <div class="dr-sec"><div class="dr-lab">Safety</div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">${compPill(sf.compliance_level)} ${evChips(b)}${sf.has_sensitive_quotes?`<span class="flagchip flag-cs">⚠ ${sf.sensitive_quote_count} sensitive quotes</span>`:''}</div>
        ${sf.has_sensitive_quotes&&['LOW','REVIEW','UNKNOWN'].includes(sf.compliance_level)?`<div class="compnote" style="margin-bottom:8px">Headline level is ${sf.compliance_level}, but ${sf.sensitive_quote_count} quote(s) below are compliance-sensitive. Treat per-quote flags as governing.</div>`:''}
        ${sf.compliance_note?`<div class="compnote">${esc(sf.compliance_note)}</div>`:''}
        <div class="qm" style="margin-top:8px">Review gate: ${(sf.review_gate||[]).join(' · ')}</div>
      </div>
      ${v.licenses?`<div class="dr-sec"><div class="dr-lab">Licenses (write from this)</div><div class="vbox lic">${esc(v.licenses)}</div></div>`:''}
      ${v.forbids?`<div class="dr-sec"><div class="dr-lab">Forbids</div><div class="vbox forb">${esc(v.forbids)}</div></div>`:''}
      ${(v.engage_triggers||[]).length?`<div class="dr-sec"><div class="dr-lab">Engage triggers</div><div class="trigs">${v.engage_triggers.map(t=>`<span class="trig">${esc(t)}</span>`).join('')}</div></div>`:''}
      ${(v.signature_sayings||[]).length?`<div class="dr-sec"><div class="dr-lab">Signature sayings</div>${v.signature_sayings.map(s=>`<span class="saying">${esc(s)}</span>`).join('')}</div>`:''}
      <div class="dr-sec"><div class="dr-lab">On the 3D map</div>
        <div class="onmap ${b.on_map.registers?'yes':'no'}"><span class="dot"></span>${b.on_map.registers?`${esc(b.on_map.core_name)} · ${b.on_map.map_quote_count} nodes <span class="mn">(${b.on_map.confidence} confidence)</span>`:'not represented as a map core'}</div>
      </div>
      <div class="dr-sec"><div class="dr-lab">Evidence · ${b.evidence_count}</div>${allq}</div>`;
    drBody.scrollTop=0;drawer.classList.add('open');
  }
  function openQuote(q){
    const b=q._b,sec=q._sec,rc=REGCOLOR[q.register]||REGCOLOR[''];
    drCrumb.innerHTML=`<span style="color:${secColor(sec)}">${esc(b.name)}</span> › quote`;
    drBody.innerHTML=`
      <div class="dr-kind" style="color:${rc}">${esc(REGNAME[q.register]||'evidence')}${q._hl?' · ★ highlight':''}</div>
      <div class="dr-quote-big" style="border-left-color:${rc}">${esc(q.text)}</div>
      ${q.context?`<div class="dr-def">${esc(q.context)}</div>`:''}
      <div class="dr-sec"><div class="dr-lab">Source</div>
        <div class="qm">${q.source?`<span>${esc(q.source)}</span>`:''}${q.date?`<span>${esc(q.date)}</span>`:''}<span><span class="regdot" style="background:${rc}"></span>${esc(REGNAME[q.register]||q.register||'—')}</span>${q.prompted?`<span>${q.prompted==='U'?'volunteered':'prompted'}</span>`:''}</div>
        ${(DB.sources&&DB.sources[q.source]&&DB.sources[q.source].title)?`<div class="dr-def">${esc(DB.sources[q.source].title)}</div>`:''}
      </div>
      ${(q.audio_verify||q.compliance_sensitive)?`<div class="dr-sec"><div class="dr-lab">Flags</div>${q.audio_verify?'<span class="flagchip flag-av">audio-verify before external use</span>':''} ${q.compliance_sensitive?`<span class="flagchip flag-cs">compliance-sensitive</span>`:''}${q.compliance_note&&q.compliance_sensitive?`<div class="compnote" style="margin-top:8px">${esc(q.compliance_note)}</div>`:''}</div>`:''}
      ${q.emphasis?`<div class="dr-sec"><div class="dr-lab">Emphasis</div><div class="dr-def">${esc(q.emphasis)}</div></div>`:''}
      <div class="dr-sec"><div class="dr-lab">Belief</div>
        <div class="vbox lic" style="border-left-color:${secColor(sec)};background:rgba(127,217,255,.04)">
          <b>${esc(b.name)}</b> · freq ${b.resonance.frequency} / conv ${b.resonance.conviction} · ${b.resonance.tier_label||'untiered'}<br>${esc(b.gloss)}
        </div>
        <button class="gotobelief" id="goBelief">Open full belief →</button>
      </div>`;
    drBody.scrollTop=0;drawer.classList.add('open');
    document.getElementById('goBelief').addEventListener('click',()=>openBelief(b.id));
  }

  // ── Export ──
  document.getElementById('export').addEventListener('click',()=>{
    let rows,header,line;
    if(state.view==='beliefs'){
      rows=beliefs.filter(beliefMatch);
      header=['id','name','sector','tier','frequency','conviction','evidence_count','compliance_level','audio_verify_pending','on_map_core','map_quote_count'];
      line=b=>[b.id,b.name,secOf(b),b.resonance.tier,b.resonance.frequency,b.resonance.conviction,b.evidence_count,b.safety.compliance_level,b.safety.audio_verify_pending,b.on_map.core_id||'',b.on_map.map_quote_count];
    }else{
      rows=allQuotes().filter(quoteMatch);
      header=['belief_id','belief','tier','frequency','conviction','compliance_level','kind','audio_verify','compliance_sensitive','register','date','source','text'];
      line=q=>[q._b.id,q._b.name,q._b.resonance.tier,q._b.resonance.frequency,q._b.resonance.conviction,q._b.safety.compliance_level,q._hl?'highlight':'quote',q.audio_verify,q.compliance_sensitive,q.register,q.date,q.source,q.text];
    }
    const csv=[header].concat(rows.map(line)).map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download=`mccauley-${state.view}-filtered.csv`;a.click();
  });

  function buildLegend(){
    document.getElementById('legend').innerHTML=Object.entries(REGNAME).map(([k,v])=>`<span class="lg"><i style="background:${REGCOLOR[k]}"></i>${esc(k)} ${esc(v)}</span>`).join('');
  }

  // ── View toggle + search ──
  function setView(v){state.view=v;
    document.getElementById('vBeliefs').classList.toggle('on',v==='beliefs');
    document.getElementById('vQuotes').classList.toggle('on',v==='quotes');render();}
  document.getElementById('vBeliefs').addEventListener('click',()=>setView('beliefs'));
  document.getElementById('vQuotes').addEventListener('click',()=>setView('quotes'));
  document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value.trim();render();});

  function render(){state.view==='beliefs'?renderBeliefs():renderQuotes();}
  function updateCounter(){document.getElementById('counter').innerHTML=`<b>${DB.belief_count}</b> beliefs · <b>${DB.quote_count+DB.highlight_count}</b> quotes · <b>${DB.source_count}</b> sources`;}

  buildFilters();buildLegend();updateCounter();render();
})();
</script>
</body>
</html>
