import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// engine/layout.js — Three-tier spatial layout for the belief field.
//
// Hierarchy:
//   SECTORS   distributed on a large Fibonacci sphere       (R_SECTOR)
//   CLUSTERS  on a small Fibonacci shell around their sector (R_CLUSTER)
//   QUOTES    on a tight shell around their cluster          (R_QUOTE)
//
// API:
//   layoutBeliefs(clusters, beliefs)                  — legacy 2-tier
//   layoutBeliefsTiered(sectors, clusters, beliefs)   — 3-tier (preferred)

const R_SECTOR  = 250;   // sectors separated into distinct groups
const R_CLUSTER = 72;    // clusters held within their sector, with room for each belief's sub-cluster halo
const R_QUOTE   = 26;
const QUOTE_JITTER = 9;
const coreRadius = qc => 7 + Math.sqrt(qc || 1) * 1.7;  // mirrors the core sizing in engine.js

function layoutBeliefsTiered(sectors, clusters, beliefs) {
  const positions = new Map();      // beliefId -> { pos, clusterCenter, sectorCenter }
  const sectorCenters = new Map();   // sectorId -> THREE.Vector3
  const clusterCenters = new Map();  // clusterId -> THREE.Vector3

  // 1. Sector centers
  sectors.forEach((s, i) => {
    sectorCenters.set(s.id, fibonacciPoint(i, sectors.length, R_SECTOR));
  });

  // 2. Cluster centers — one Fibonacci shell per sector
  sectors.forEach(s => {
    const sClusters = clusters.filter(c => c.sector === s.id);
    const center = sectorCenters.get(s.id);
    sClusters.forEach((c, i) => {
      const local = fibonacciPoint(i, Math.max(2, sClusters.length), R_CLUSTER);
      // If only one cluster in a sector, plant it dead-center
      const offset = sClusters.length === 1 ? new THREE.Vector3(0,0,0) : local;
      clusterCenters.set(c.id, center.clone().add(offset));
    });
  });

  // 3. Belief positions: cluster nodes at center, quote nodes on tight shell
  const grouped = new Map();
  clusters.forEach(c => grouped.set(c.id, []));
  beliefs.forEach(b => {
    if (b.kind === 'cluster') return;
    if (grouped.has(b.cluster)) grouped.get(b.cluster).push(b);
  });

  // Cluster nodes
  beliefs.filter(b => b.kind === 'cluster').forEach(b => {
    const cc = clusterCenters.get(b.cluster) || new THREE.Vector3(0,0,0);
    const sc = sectorCenters.get(b.sector) || cc;
    positions.set(b.id, { pos: cc.clone(), clusterCenter: cc, sectorCenter: sc });
  });

  // ─── HUB TOPOLOGY ────────────────────────────────────────────────
  // Cluster core at center. Source HUBS orbit the core. Quotes orbit their
  // hub — so you can follow the trail: cluster → [Tweets hub] → tweets.
  // Interview/podcast hubs are shared: positioned at the centroid of the
  // clusters they touch, pulled outward into open space.
  const hubs = beliefs.filter(b => b.kind === 'hub');
  const quotesByHub = new Map();
  beliefs.forEach(b => {
    if (b.kind !== 'quote') return;
    const h = b.hub || 'none';
    if (!quotesByHub.has(h)) quotesByHub.set(h, []);
    quotesByHub.get(h).push(b);
  });

  const hubPos = new Map(); // hubId -> Vector3
  const phi = Math.PI * (3 - Math.sqrt(5));

  // ── Hierarchy positioning (2026-06-10): Cluster > Sub-Belief > Category >
  // Source. Each tier sits on a fibonacci shell around its parent, radiating
  // outward from the cluster center so chains stay legible. Legacy single-tier
  // 'category'/'source' hubs without a parent fall back to the cluster shell.
  const TIER_ORDER = { category: 0, source: 1 };
  // Recency boost inflates the rendered glass core by up to +35% (engine.js), so the
  // layout must use the BOOSTED radius or boosted beliefs swallow their own hubs
  // (fixed 2026-06-10: 'some of his sections are inside the cluster bubbles').
  const boostByCluster = new Map();
  beliefs.forEach(b => {
    if (b.kind === 'cluster') boostByCluster.set(b.cluster, b.recencyBoost || 0);
  });
  const effCoreR = (cid) => {
    const qc = clusters.find(c => c.id === cid)?.quote_count;
    return coreRadius(qc) * (1 + 0.35 * (boostByCluster.get(cid) || 0));
  };
  const TIER_DIST = {
    // category hubs sit clearly OUTSIDE the belief's glass core (never inside the ball)
    category: (coreR, f) => coreR + 12 + Math.sqrt(f || 1) * 1.4,
    source:   (_r, f) => 6 + Math.sqrt(f || 1) * 0.9,
  };
  const tiered = hubs.filter(h => h.hubType in TIER_ORDER)
    .sort((a, b) => TIER_ORDER[a.hubType] - TIER_ORDER[b.hubType]);
  const siblingsOf = new Map();   // parentId -> [hubs]
  tiered.forEach(h => {
    const pid = h.parent || ('C:' + h.cluster);
    if (!siblingsOf.has(pid)) siblingsOf.set(pid, []);
    siblingsOf.get(pid).push(h);
  });
  for (const [pid, sibs] of siblingsOf) {
    // parent position: cluster center for top tier, else the already-laid hub
    let pp = null, cc = null;
    if (pid.startsWith('C:')) {
      cc = clusterCenters.get(pid.slice(2));
      pp = cc;
    } else {
      pp = hubPos.get(pid);
      cc = clusterCenters.get(sibs[0].cluster) || pp;
    }
    if (!pp) continue;
    const outward = cc && pp && !pp.equals(cc)
      ? pp.clone().sub(cc).normalize()
      : pp.clone().normalize();
    const coreR = effCoreR(sibs[0].cluster);
    sibs.forEach((h, hi) => {
      const yc = 1 - (hi / Math.max(1, sibs.length - 1)) * 1.6;
      const rc = Math.sqrt(Math.max(0, 1 - yc * yc));
      const tc = phi * hi * 2.6;
      let dir = new THREE.Vector3(Math.cos(tc) * rc, yc, Math.sin(tc) * rc).normalize();
      // bias child shells outward from the cluster so chains radiate, not fold back
      if (!pid.startsWith('C:')) dir = dir.multiplyScalar(0.55).add(outward.clone().multiplyScalar(0.8)).normalize();
      const dist = (TIER_DIST[h.hubType] || TIER_DIST.category)(coreR, h.frequency);
      const hp = pp.clone().add(dir.multiplyScalar(dist));
      hubPos.set(h.id, hp);
      positions.set(h.id, { pos: hp.clone(), clusterCenter: cc || hp, sectorCenter: sectorCenters.get(clusters.find(c => c.id === h.cluster)?.sector) || hp, hubDir: dir });
    });
  }

  // Interview hubs: centroid of touched clusters, pushed outward from origin.
  hubs.filter(h => h.hubType === 'interview').forEach(h => {
    const centers = (h.cores || []).map(c => clusterCenters.get(c)).filter(Boolean);
    let base;
    if (centers.length) {
      base = new THREE.Vector3();
      centers.forEach(c => base.add(c));
      base.multiplyScalar(1 / centers.length);
    } else {
      base = new THREE.Vector3(0, 0, 0);
    }
    // push outward so interview hubs sit in open space, not buried in a cluster
    const outward = base.clone().normalize().multiplyScalar(70);
    const hp = base.add(outward);
    hubPos.set(h.id, hp);
    positions.set(h.id, { pos: hp.clone(), clusterCenter: hp.clone(), sectorCenter: hp.clone() });
  });

  // Quotes orbit their hub in a tight cloud; size of cloud scales with count.
  quotesByHub.forEach((list, hid) => {
    const hp = hubPos.get(hid);
    if (!hp) return;
    const n = list.length;
    list.sort((a, b) => (b.strength01 ?? 0) - (a.strength01 ?? 0));
    const shell = 5 + Math.sqrt(n) * 1.7;   // tight cloud hugging the hub
    list.forEach((b, i) => {
      const yq = 1 - (i / Math.max(1, n - 1)) * 2;
      const rq = Math.sqrt(Math.max(0, 1 - yq * yq));
      const tq = phi * i;
      const radius = shell * (0.78 + (1 - (b.strength01 ?? 0.5)) * 0.4) + Math.random() * 1.6;
      const local = new THREE.Vector3(Math.cos(tq) * rq, yq, Math.sin(tq) * rq).multiplyScalar(radius);
      local.x += (Math.random() - 0.5) * 2;
      local.y += (Math.random() - 0.5) * 2;
      local.z += (Math.random() - 0.5) * 2;
      positions.set(b.id, { pos: hp.clone().add(local), clusterCenter: hp, sectorCenter: hp });
    });
  });

  return { positions, sectorCenters, clusterCenters };
}

// ─── Legacy 2-tier (kept for observatory.html / constellation.html) ────
function layoutBeliefs(clusters, beliefs) {
  const positions = new Map();
  const centers = new Map();
  const CLUSTER_R = 180;
  const OUTER = 56, INNER = 22;
  clusters.forEach((c, i) => {
    centers.set(c.id, fibonacciPoint(i, clusters.length, CLUSTER_R, 0.6));
  });
  const grouped = new Map();
  clusters.forEach(c => grouped.set(c.id, []));
  beliefs.forEach(b => {
    if (grouped.has(b.cluster)) grouped.get(b.cluster).push(b);
  });
  for (const [cid, list] of grouped) {
    list.sort((a, b) => b.popularity - a.popularity);
    const center = centers.get(cid);
    const n = list.length;
    const phi = Math.PI * (3 - Math.sqrt(5));
    list.forEach((b, i) => {
      const tPop = 1 - b.popularity;
      const radius = INNER + tPop * (OUTER - INNER);
      const y = 1 - (i / Math.max(1, n - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = phi * i;
      const local = new THREE.Vector3(
        Math.cos(theta) * r, y, Math.sin(theta) * r
      ).multiplyScalar(radius);
      local.x += (Math.random() - 0.5) * 5;
      local.y += (Math.random() - 0.5) * 5;
      local.z += (Math.random() - 0.5) * 5;
      positions.set(b.id, { pos: center.clone().add(local), clusterCenter: center });
    });
  }
  return positions;
}

// ─── helpers ─────────────────────────────────────────────────────
function fibonacciPoint(i, total, R, yScale = 1) {
  const phi = Math.PI * (3 - Math.sqrt(5));
  const y = 1 - (i / Math.max(1, total - 1)) * 2;
  const r = Math.sqrt(1 - y * y);
  const theta = phi * i;
  return new THREE.Vector3(Math.cos(theta) * r * R, y * R * yScale, Math.sin(theta) * r * R);
}

// engine/ui-person.js — Single-person belief panel.
// Purpose-built for the McCauley schema: conviction, evidence_strength,
// frequency, emphasis_markers, sources, rationale, and the relationship types
// `reinforces`, `foundational`, `derives`, `rejects`.
//
// Public API: export function buildUI(opts) — same signature as engine/ui.js

function buildUI({
  container, theme, sectors, clusters, beliefs, neighbors, beliefById, clusterById,
  onSelect, onHover, onFilter, onPlayPropagation, onResetCamera, onToggleAutoRotate,
  state, subject,
}) {
  injectStyles(container, theme);

  if (!document.getElementById('bcm-fonts')) {
    const link = document.createElement('link');
    link.id = 'bcm-fonts';
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap';
    document.head.appendChild(link);
  }

  // Subject defaults
  subject = subject || { name: 'Subject', role: '', sources_ingested: 0, sources_planned: 0 };

  const overlay = el('div', { class: 'bcm-overlay' });
  container.appendChild(overlay);

  // ─── Top bar ─────────────────────────────────────────────────
  const topbar = el('div', { class: 'bcm-topbar' });
  topbar.innerHTML = `
    <div class="bcm-brand">
      <div class="bcm-logo">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="12" cy="12" r="3"/>
          <circle cx="12" cy="12" r="8" stroke-dasharray="2 3"/>
          <circle cx="20" cy="6" r="1.2" fill="currentColor"/>
          <circle cx="4"  cy="18" r="1.2" fill="currentColor"/>
          <circle cx="19" cy="19" r="1"   fill="currentColor"/>
          <line x1="12" y1="12" x2="20" y2="6"/>
          <line x1="12" y1="12" x2="4"  y2="18"/>
          <line x1="12" y1="12" x2="19" y2="19"/>
        </svg>
      </div>
      <div class="bcm-titles">
        <div class="bcm-title">${escapeHtml(subject.name)}</div>
        <div class="bcm-subtitle">Belief Field \u00b7 ${escapeHtml(subject.role || '')}</div>
      </div>
    </div>
    <div class="bcm-search">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="6"/><path d="M20 20l-3.5-3.5"/>
      </svg>
      <input type="text" placeholder="Search beliefs, sources, quotes, concepts\u2026" />
      <div class="bcm-results"></div>
    </div>
    <div class="bcm-topright">
      <span class="bcm-counter"></span>
    </div>
  `;
  overlay.appendChild(topbar);

  const searchInput = topbar.querySelector('input');
  const results = topbar.querySelector('.bcm-results');
  const counter = topbar.querySelector('.bcm-counter');

  // ── Comprehensive search (2026-06-10): beliefs + named sources + quotes + concept
  //    tags, with pre-populated suggestions on focus. One flat index of
  //    {type, label, sub, nodeId, text} rows; substring match over label+text.
  const SRC_TABLE = (typeof window !== 'undefined' && window.SOURCES) || {};
  const clusterNodes = beliefs.filter(b => b.kind === 'cluster');
  const hubNodes = beliefs.filter(b => b.kind === 'hub');
  const quoteNodes = beliefs.filter(b => b.kind === 'quote');
  const INDEX = [];
  clusterNodes.forEach(b => {
    const cl = clusterById.get(b.cluster);
    const tags = (b.cluster_data || {}).concept_tags || (cl || {}).concept_tags || [];
    INDEX.push({ type: 'belief', label: b.title, sub: `${cl?.name || ''} · conviction ${Math.round((b.conviction ?? 0) * 100)}`,
                 nodeId: b.id, hue: cl?.hue ?? 0.6, vol: cl?.quote_count || 0,
                 text: `${b.title} ${b.summary || ''} ${cl?.summary || ''} ${tags.join(' ')}`.toLowerCase() });
  });
  // Sources are a BY-PRODUCT of beliefs: index by real-world source identity
  // (source_key: 'x-com' for all tweets, slug otherwise); clicking opens the
  // cross-belief AGGREGATE view, never a single node.
  const bySource = new Map();
  quoteNodes.forEach(qn => {
    const qd = qn.quote_data || {};
    const skey = qd.source_key || qd.source_id;
    if (!skey) return;
    if (!bySource.has(skey)) bySource.set(skey, { quotes: 0, beliefs: new Set(), title: '' });
    const e = bySource.get(skey);
    e.quotes += 1;
    e.beliefs.add(qn.cluster);
  });
  hubNodes.forEach(h => {
    const hd = h.hub_data || {};
    const skey = hd.source_key || hd.source_id;
    if (skey && bySource.has(skey) && !bySource.get(skey).title) bySource.get(skey).title = hd.title || '';
  });
  for (const [skey, e] of bySource) {
    const title = e.title || SRC_TABLE[skey]?.title || skey;
    INDEX.push({ type: 'source', label: title, sub: `source · ${e.quotes} quotes · ${e.beliefs.size} belief${e.beliefs.size === 1 ? '' : 's'}`,
                 nodeId: null, hue: null, vol: e.quotes, text: `${title} ${skey}`.toLowerCase(), sid: skey });
  }
  // Concept tags: each tag is a result; clicking one expands to its beliefs.
  const tagMap = new Map();
  clusterNodes.forEach(b => {
    const tags = (b.cluster_data || {}).concept_tags || (clusterById.get(b.cluster) || {}).concept_tags || [];
    tags.forEach(t => { if (!tagMap.has(t)) tagMap.set(t, []); tagMap.get(t).push(b); });
  });
  for (const [t, bs] of tagMap) {
    INDEX.push({ type: 'tag', label: t, sub: `concept · ${bs.length} belief${bs.length === 1 ? '' : 's'}`,
                 nodeId: bs[0].id, hue: null, vol: bs.length, text: t.toLowerCase(), tag: t });
  }
  quoteNodes.forEach(qn => {
    const qd = qn.quote_data || {};
    INDEX.push({ type: 'quote', label: (qd.text || '').slice(0, 90), sub: `quote · ${SRC_TABLE[qd.source_id]?.title || qd.source_id || ''} · ${qd.date || ''}`,
                 nodeId: qn.id, hue: null, vol: 0,
                 text: `${qd.text || ''} ${SRC_TABLE[qd.source_id]?.title || ''} ${qd.source_id || ''}`.toLowerCase() });
  });
  const TYPE_BADGE = { belief: '◆', source: '◉', tag: '#', quote: '❝' };
  const TYPE_ORDER = { belief: 0, source: 1, tag: 2, quote: 3 };
  const GROUP_LABEL = { belief: 'Beliefs', source: 'Sources', tag: 'Concepts', quote: 'Quotes' };

  function renderRows(rows, q) {
    results.innerHTML = '';
    if (!rows.length) { results.innerHTML = `<div class="bcm-result bcm-empty">No matches</div>`; return; }
    let lastType = null;
    for (const r of rows) {
      if (r.type !== lastType) {
        lastType = r.type;
        const head = el('div', { class: 'bcm-result-group' });
        head.textContent = GROUP_LABEL[r.type];
        results.appendChild(head);
      }
      const item = el('div', { class: 'bcm-result' });
      const dot = r.hue != null
        ? `<span class="bcm-dot" style="background:hsl(${r.hue * 360},60%,60%)"></span>`
        : `<span class="bcm-dot bcm-dot-type">${TYPE_BADGE[r.type]}</span>`;
      item.innerHTML = `${dot}<div class="bcm-result-text"><strong>${q ? highlight(r.label, q) : escapeHtml(r.label)}</strong><span>${escapeHtml(r.sub)}</span></div>`;
      item.addEventListener('mousedown', (ev) => ev.preventDefault());
      item.addEventListener('click', () => {
        if (r.type === 'tag') { searchInput.value = r.tag; runSearch(); searchInput.focus(); return; }
        if (r.type === 'source') {
          renderSourceAggregate(r.sid, r.label);
          searchInput.value = '';
          results.style.display = 'none';
          return;
        }
        onSelect(r.nodeId);
        searchInput.value = '';
        results.style.display = 'none';
      });
      results.appendChild(item);
    }
  }

  // Pre-populated suggestions on focus: top beliefs, top sources, top concepts by volume.
  function suggestions() {
    const top = (type, n) => INDEX.filter(r => r.type === type).sort((a, b) => b.vol - a.vol).slice(0, n);
    return [...top('belief', 4), ...top('source', 5), ...top('tag', 4)];
  }

  function runSearch() {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { renderRows(suggestions(), ''); results.style.display = 'block'; return; }
    const matches = INDEX.filter(r => r.text.includes(q))
      .sort((a, b) => TYPE_ORDER[a.type] - TYPE_ORDER[b.type] || b.vol - a.vol);
    const capped = [];
    const perType = { belief: 6, source: 5, tag: 4, quote: 8 };
    const seenType = {};
    for (const m of matches) {
      seenType[m.type] = (seenType[m.type] || 0) + 1;
      if (seenType[m.type] <= perType[m.type]) capped.push(m);
      if (capped.length >= 20) break;
    }
    renderRows(capped, q);
    results.style.display = 'block';
  }

  searchInput.addEventListener('input', runSearch);
  searchInput.addEventListener('blur', () => setTimeout(() => results.style.display = 'none', 180));
  searchInput.addEventListener('focus', runSearch);
  // ─── Left dock ──────────────────────────────────────────────
  const dock = el('div', { class: 'bcm-leftdock' });
  const hasSectors = sectors && sectors.length;
  dock.innerHTML = `
    <div class="bcm-section-title">Clusters</div>
    <div class="bcm-clusters"></div>
    <div class="bcm-section-title bcm-spaced">Cluster conviction</div>
    <div class="bcm-strength">
      <input type="range" min="0" max="1" step="0.05" value="0">
      <div class="bcm-strength-vals"><span>show all</span><span class="bcm-strength-cur">\u2265 0.00</span></div>
    </div>
    <div class="bcm-section-title bcm-spaced">Source legend</div>
    <div class="bcm-legend">
      <div class="bcm-legend-row"><span class="bcm-leg-node bcm-leg-cluster"></span><span>Belief (glass core)</span></div>
      <div class="bcm-legend-row"><span class="bcm-leg-dot" style="background:#4eb3ff;box-shadow:0 0 8px #4eb3ff"></span><span>Tweet / X</span></div>
      <div class="bcm-legend-row"><span class="bcm-leg-dot" style="background:#b98bff;box-shadow:0 0 8px #b98bff"></span><span>Podcast</span></div>
      <div class="bcm-legend-row"><span class="bcm-leg-dot" style="background:#34d399;box-shadow:0 0 8px #34d399"></span><span>Interview</span></div>
      <div class="bcm-legend-row"><span class="bcm-leg-dot" style="background:#ff9d4c;box-shadow:0 0 8px #ff9d4c"></span><span>Press</span></div>
      <div class="bcm-legend-row"><span class="bcm-leg-dot" style="background:#f5d76e;box-shadow:0 0 8px #f5d76e"></span><span>Testimony / official</span></div>
      <div class="bcm-legend-row"><span class="bcm-leg-dot" style="background:#ff6f9c;box-shadow:0 0 8px #ff6f9c"></span><span>Blog / bylined</span></div>
      <div class="bcm-legend-row bcm-legend-note">Quotes sub-cluster by source. Node size = signal strength.</div>
      <div class="bcm-legend-row bcm-legend-note">Bigger + brighter = talked about recently. Full glow under 30 days, fading 10% per 30 days back to baseline.</div>
    </div>
  `;
  overlay.appendChild(dock);

  const clustersEl = dock.querySelector('.bcm-clusters');

  if (hasSectors) {
    // Render sectors, each with their child clusters
    sectors.forEach(s => {
      const sectorClusters = clusters.filter(c => c.sector === s.id);
      const totalQuotes = sectorClusters.reduce((n, c) => n + (c.quote_count ?? 0), 0);
      const block = el('div', { class: 'bcm-sector-block' });
      block.dataset.sid = s.id;
      block.innerHTML = `
        <div class="bcm-sector-head" title="${escapeHtml(s.blurb || '')}">
          <span class="bcm-cluster-dot" style="background:hsl(${s.hue*360},65%,60%);box-shadow:0 0 12px hsl(${s.hue*360},80%,55%)"></span>
          <span class="bcm-cluster-name">${escapeHtml(s.name)}</span>
          <span class="bcm-cluster-count">${sectorClusters.length}\u00b7${totalQuotes}</span>
        </div>
        <div class="bcm-sector-children"></div>
      `;
      const children = block.querySelector('.bcm-sector-children');
      sectorClusters.forEach(c => {
        const row = el('div', { class: 'bcm-cluster bcm-child' });
        row.dataset.cid = c.id;
        const strength = Math.round((c.strength ?? 0) * 100);
        row.innerHTML = `
          <span class="bcm-cluster-sub-dot" style="background:hsl(${c.hue*360},60%,60%)"></span>
          <span class="bcm-cluster-name" title="${escapeHtml(c.headline || '')}">${escapeHtml(c.name)}</span>
          <span class="bcm-cluster-count" title="${c.quote_count} quotes, strength ${strength}/100">${c.quote_count}</span>
        `;
        row.addEventListener('click', e => {
          e.stopPropagation();
          // Click = select + zoom to the cluster and open its panel.
          onSelect('C:' + c.id);
          // Make sure it's visible if previously hidden.
          if (!state.visibleClusters.has(c.id)) {
            state.visibleClusters.add(c.id);
            row.classList.remove('bcm-off');
            syncSectorState(block, sectorClusters);
            onFilter();
            updateCounter();
          }
        });
        row.addEventListener('dblclick', e => {
          e.preventDefault();
          e.stopPropagation();
          state.visibleClusters.clear();
          state.visibleClusters.add(c.id);
          [...clustersEl.querySelectorAll('.bcm-cluster')].forEach(ch => ch.classList.toggle('bcm-off', ch.dataset.cid !== c.id));
          [...clustersEl.querySelectorAll('.bcm-sector-block')].forEach(sb => sb.classList.remove('bcm-off'));
          onFilter();
          updateCounter();
        });
        children.appendChild(row);
      });
      // Click sector head: select the strongest cluster in this sector and zoom to it.
      // Shift-click toggles visibility of all clusters in the sector together.
      block.querySelector('.bcm-sector-head').addEventListener('click', (e) => {
        if (e.shiftKey) {
          const allOn = sectorClusters.every(c => state.visibleClusters.has(c.id));
          sectorClusters.forEach(c => {
            if (allOn) state.visibleClusters.delete(c.id);
            else state.visibleClusters.add(c.id);
          });
          [...block.querySelectorAll('.bcm-cluster')].forEach(ch => ch.classList.toggle('bcm-off', allOn));
          block.classList.toggle('bcm-off', allOn);
          onFilter();
          updateCounter();
          return;
        }
        // Default: open the strongest cluster in this sector.
        const strongest = sectorClusters.slice().sort((a, b) => (b.strength ?? 0) - (a.strength ?? 0))[0];
        if (strongest) onSelect('C:' + strongest.id);
      });
      clustersEl.appendChild(block);
    });
  } else {
    // Legacy: flat cluster list
    clusters.forEach(c => {
      const row = el('div', { class: 'bcm-cluster' });
      row.dataset.cid = c.id;
      const count = beliefs.filter(b => b.cluster === c.id).length;
      row.innerHTML = `
        <span class="bcm-cluster-dot" style="background:hsl(${c.hue*360},60%,60%);box-shadow:0 0 12px hsl(${c.hue*360},80%,55%)"></span>

  function syncSectorState(block, sectorClusters) {

    block.classList.toggle('bcm-off', allOff);
  }

  const strengthInput = dock.querySelector('.bcm-strength input');
  const strengthCur = dock.querySelector('.bcm-strength-cur');
  strengthInput.addEventListener('input', () => {
    state.minStrength = parseFloat(strengthInput.value);

    </button>
    <button class="bcm-btn bcm-toggle bcm-on" data-act="autorot">

  overlay.appendChild(bottom);
  bottom.querySelector('[data-act="reset"]').addEventListener('click', onResetCamera);
  bottom.querySelector('[data-act="fitall"]').addEventListener('click', () => (onFitAll ? onFitAll() : onResetCamera()));
  const arBtn = bottom.querySelector('[data-act="autorot"]');
  arBtn.addEventListener('click', () => {
    const on = arBtn.classList.toggle('bcm-on');
    onToggleAutoRotate(on);
  });
  const propBtn = { disabled: true, classList: { toggle: () => {} } };  // no-op stub for legacy refs

  // ─── Tooltip ────────────────────────────────────────────────
  const tip = el('div', { class: 'bcm-tooltip' });
  tip.style.display = 'none';
  overlay.appendChild(tip);

  function setTooltip(belief) {
    if (!belief) { tip.style.display = 'none'; return; }
    const cl = clusterById.get(belief.cluster);
    const conv = Math.round((belief.conviction ?? 0) * 100);
    const ev = Math.round((belief.evidence_strength ?? 0) * 100);
    tip.innerHTML = `
      <div class="bcm-tip-cluster" style="color:hsl(${cl.hue*360},60%,72%)">${cl.name}</div>

        <div class="bcm-tip-stat"><span class="bcm-tip-stat-l">Evidence</span><span class="bcm-tip-stat-v">${ev}</span></div>
        <div class="bcm-tip-stat"><span class="bcm-tip-stat-l">Restatements</span><span class="bcm-tip-stat-v">${belief.frequency ?? 0}</span></div>
      </div>
    `;
    tip.style.display = 'block';
  }

  container.addEventListener('pointermove', e => {
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    tip.style.left = Math.min(rect.width - 260, x + 16) + 'px';

  // ─── Detail panel ───────────────────────────────────────────
  const panel = el('div', { class: 'bcm-panel' });
  panel.innerHTML = `
    <div class="bcm-panel-head">
      <span class="bcm-panel-cluster"></span>
      <button class="bcm-panel-close" aria-label="Close">\u00d7</button>
    </div>
    <div class="bcm-panel-body"></div>
    <div class="bcm-panel-footer"></div>
  `;
  overlay.appendChild(panel);

  panel.querySelector('.bcm-panel-close').addEventListener('click', () => onSelect(null));

  function openPanel(id) {
    const b = beliefById.get(id);
    if (!b) return;
    const cl = clusterById.get(b.cluster);
    const sectorObj = sectors?.find(s => s.id === cl?.sector);

    panel.classList.add('bcm-open');
    panel.style.setProperty('--cluster-hue', `${(cl?.hue ?? 0.6) * 360}`);
    const head = panel.querySelector('.bcm-panel-cluster');
    head.innerHTML = sectorObj
      ? `<span class="bcm-breadcrumb-sector">${escapeHtml(sectorObj.name)}</span><span class="bcm-breadcrumb-sep">\u203A</span><span>${escapeHtml(cl.name)}</span>`
      : escapeHtml(cl?.name || '');

    if (b.kind === 'cluster') {
      renderClusterPanel(b, cl, sectorObj);
    } else if (b.kind === 'hub') {
      renderHubPanel(b, cl, sectorObj);
    } else if (b.kind === 'quote') {
      renderQuotePanel(b, cl, sectorObj);
    } else {
      // legacy belief shape — fall back to a generic render
      renderClusterPanel(b, cl, sectorObj);
    }

    propBtn.disabled = false;
    panel.querySelector('.bcm-panel-body').scrollTop = 0;
  }

  function renderClusterPanel(b, cl, sectorObj) {
    const cluster = b.cluster_data || cl;
    const allQuotes = (window.QUOTES || []).filter(q => q.cluster === b.cluster);
    const facetsForCore = (window.FACETS || []).filter(f => f.core === b.cluster);
    const tierBreakdown = countTiers(allQuotes);
    const accuracy = Math.round((cluster.accuracy_rating ?? 0) * 100);

    const chip = arr => (arr && arr.length)
      ? `<div class="bcm-chips">${arr.map(m => `<span class="bcm-chip">${escapeHtml(m)}</span>`).join('')}</div>` : '';

    // Build facet sections (expandable). First facet is expanded by default.
    const facetSectionsHtml = facetsForCore.length
      ? facetsForCore.map((f, idx) => {
          const fq = allQuotes.filter(q => q.facet === f.id).sort((a, b) => (b.signal_strength ?? 0) - (a.signal_strength ?? 0));
          const fAcc = Math.round((f.accuracy_rating ?? 0) * 100);
          return `
            <div class="bcm-facet ${idx === 0 ? 'bcm-facet-open' : ''}" data-facet="${escapeAttr(f.id)}">
              <button class="bcm-facet-head" type="button">
                <span class="bcm-facet-caret">\u25B8</span>
                <span class="bcm-facet-title">${escapeHtml(f.name || f.id)}</span>
                <span class="bcm-facet-meta">${fq.length}q${fAcc ? ' \u00b7 ' + fAcc : ''}</span>
              </button>
              <div class="bcm-facet-body">
                ${f.headline ? `<div class="bcm-facet-headline">${escapeHtml(f.headline)}</div>` : ''}
                ${f.summary ? `<div class="bcm-facet-summary">${escapeHtml(f.summary)}</div>` : ''}
                ${f.supporting_viewpoints ? renderSupportingViewpoints(f.supporting_viewpoints) : ''}
                ${(f.signature_phrases && f.signature_phrases.length) ? `<div class="bcm-facet-sub-label">Signature phrases</div>${chip(f.signature_phrases)}` : ''}
                ${f.tone ? `<div class="bcm-facet-sub-label">Tone</div><div class="bcm-tone">${escapeHtml(f.tone)}</div>` : ''}
                ${(f.origin && (f.origin.formative || f.origin.emotional)) ? `
                  <div class="bcm-facet-sub-label">Origin</div>
                  <div class="bcm-origin">
                    ${f.origin.formative ? `<div class="bcm-origin-row"><span class="bcm-origin-l">Formative</span><span class="bcm-origin-v">${escapeHtml(f.origin.formative)}</span></div>` : ''}
                    ${f.origin.influences ? `<div class="bcm-origin-row"><span class="bcm-origin-l">Influences</span><span class="bcm-origin-v">${escapeHtml(f.origin.influences)}</span></div>` : ''}
                    ${f.origin.emotional ? `<div class="bcm-origin-row"><span class="bcm-origin-l">Emotional</span><span class="bcm-origin-v">${escapeHtml(f.origin.emotional)}</span></div>` : ''}
                    ${f.origin.confidence ? `<div class="bcm-origin-row"><span class="bcm-origin-l">Confidence</span><span class="bcm-origin-v"><span class="bcm-stat-pill">${escapeHtml(f.origin.confidence)}</span></span></div>` : ''}
                  </div>
                ` : ''}
                ${fq.length ? `<div class="bcm-facet-sub-label">Evidence \u00b7 ${fq.length} quote${fq.length===1?'':'s'}</div>
                  <div class="bcm-quote-list" data-host-for="${escapeAttr(f.id)}"></div>` : ''}
                ${(f.clarifying_questions && f.clarifying_questions.length) ? `
                  <div class="bcm-facet-sub-label">Clarifying questions</div>
                  <ol class="bcm-questions">${f.clarifying_questions.map(q => `<li>${escapeHtml(q)}</li>`).join('')}</ol>
                ` : ''}
              </div>
            </div>
          `;
        }).join('')
      : '';

    panel.querySelector('.bcm-panel-body').innerHTML = `
      <div class="bcm-panel-kind">Belief cluster</div>
      <div class="bcm-panel-title">${escapeHtml(cluster.name)}</div>

      ${cluster.summary ? `<div class="bcm-panel-summary">${escapeHtml(cluster.summary)}</div>` : ''}

      <div class="bcm-panel-conviction">
        <div class="bcm-conv-grid">
          <div class="bcm-stat"><span>Accuracy</span><span class="bcm-bar"><span class="bcm-bar-fill" style="width:${accuracy}%"></span></span><span class="bcm-stat-v">${accuracy}</span></div>
          <div class="bcm-freq-row">
            <span class="bcm-freq-badge">${facetsForCore.length} facet${facetsForCore.length===1?'':'s'} \u00b7 ${allQuotes.length} quote${allQuotes.length===1?'':'s'}</span>
            <span class="bcm-freq-sub">${tierBreakdown}</span>
          </div>
        </div>
      </div>

      ${cluster.supporting_viewpoints ? `<div class="bcm-panel-section"><div class="bcm-panel-label">Supporting viewpoints</div>${renderSupportingViewpoints(cluster.supporting_viewpoints)}</div>` : ''}

      ${cluster.why_a_cluster ? `<div class="bcm-panel-section"><div class="bcm-panel-label">Why this is a cluster</div><div class="bcm-rationale bcm-rationale-alt">${escapeHtml(cluster.why_a_cluster)}</div></div>` : ''}

      ${facetSectionsHtml ? `
        <div class="bcm-panel-section">
          <div class="bcm-panel-label">Facets \u00b7 <span class="bcm-sources-count">${facetsForCore.length}</span></div>
          <div class="bcm-facets">${facetSectionsHtml}</div>
        </div>
      ` : `
        <div class="bcm-panel-section">
          <div class="bcm-panel-label">Evidence \u00b7 ${allQuotes.length} quote${allQuotes.length===1?'':'s'}</div>
          <div class="bcm-quote-list" data-host-for="__all__"></div>
        </div>
      `}
    `;

    // Mount quote rows into each facet's quote-list host.
    panel.querySelectorAll('[data-host-for]').forEach(host => {
      const facetId = host.dataset.hostFor;
      const list = facetId === '__all__'
        ? allQuotes
        : allQuotes.filter(q => q.facet === facetId);
      list.sort((a, b) => (b.signal_strength ?? 0) - (a.signal_strength ?? 0));
      list.forEach(q => {
        const meta = window.SOURCES?.[q.source_id] || {};
        const tier = meta.tier || '\u2014';
        const cat = srcCategory(q);
        const row = el('div', { class: 'bcm-source-row bcm-quote-clickable' });
        row.style.borderLeft = `3px solid ${cat.c}`;
        const body = fmtQuote(q.text || q.paraphrase);
        row.innerHTML = `
          <div class="bcm-source-head">
            <span class="bcm-cat-badge" style="background:${cat.c}22;color:${cat.c};border-color:${cat.c}55">${escapeHtml(cat.label)}</span>
            <span class="bcm-source-tier bcm-tier-${escapeAttr((tier+'').toLowerCase())}">${escapeHtml(tier)}</span>
            <span class="bcm-source-date">${escapeHtml(q.date || meta.date || '')}</span>
            <span class="bcm-source-venue">${escapeHtml(meta.venue || '')}</span>
            ${srcUrl ? `<a class="bcm-source-link" href="${escapeAttr(srcUrl)}" target="_blank" rel="noopener" title="Open source">\u2197</a>` : ''}
          </div>

          if (e.target.closest('a')) return;

    // Facet accordion toggles
    panel.querySelectorAll('.bcm-facet-head').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.closest('.bcm-facet').classList.toggle('bcm-facet-open');
      });

    panel.querySelector('.bcm-panel-footer').innerHTML = '';
  }

  const CAT_META = {
    tweet:     { k: 'tweet',     label: 'Tweet / X',            c: '#4eb3ff' },
    podcast:   { k: 'podcast',   label: 'Podcast',              c: '#b98bff' },
    interview: { k: 'interview', label: 'Interview',            c: '#34d399' },
    press:     { k: 'press',     label: 'Press',                c: '#ff9d4c' },
    official:  { k: 'official',  label: 'Testimony / official', c: '#f5d76e' },
    blog:      { k: 'blog',      label: 'Written / bylined',    c: '#ff6f9c' },
  };
  const REG_CAT = { A: 'interview', B: 'podcast', C: 'blog', D: 'tweet', E: 'official' };
  // Category of a quote: the DATA's category first (register-derived at build time),
  // then the quote's register letter, then slug/venue inference. There is NO 'Other'
  // bucket (Jarred, 2026-06-10): every quote in this data model has a register, and the
  // final fallback for pathological data is 'press', never a junk category.
  function srcCategory(q) {
    const qd = (q && typeof q === 'object') ? q : {};
    const sid = qd.source_id || (typeof q === 'string' ? q : '');
    if (qd.category && CAT_META[qd.category]) return CAT_META[qd.category];
    const reg = String(qd.register || '').toUpperCase();
    if (REG_CAT[reg]) return CAT_META[REG_CAT[reg]];
    const s = window.SOURCES?.[sid] || {};
    const t = String(s.tier || '').toUpperCase();
    if (REG_CAT[t]) return CAT_META[REG_CAT[t]];
    const v = `${sid} ${(s.venue || '')}`.toLowerCase();
    if (/tweet|twitter|@|\borig-|\bquote-|\breply/.test(v)) return CAT_META.tweet;
    if (/podcast|episode|radio|spotify|soundcloud|libsyn|youtube|panel|fireside|interview|-tv\b/.test(v)) return CAT_META.podcast;
    if (/testimony|house|senate|committee|occ|comptroller|congress|filing|sec\b|release/.test(v)) return CAT_META.official;
    if (/blog|medium|mirror|substack|essay|insights|writings|article/.test(v)) return CAT_META.blog;
    if (t === 'T2') return CAT_META.interview;
    return CAT_META.press;
  }

  // Aggregated SOURCE view: a source is a by-product of beliefs, so clicking it
  // shows EVERY belief it evidences and EVERY quote, grouped by belief.

  function countTiers(quotes) {
    const c = { T1: 0, T2: 0, T3: 0, T4: 0, T5: 0 };
    quotes.forEach(q => {

  function closePanel() {
    panel.classList.remove('bcm-open');

    propBtn.classList.toggle('bcm-active', active);

  function updateCounter() {
    // correct labeling (Jarred, 2026-06-10): beliefs = the cores; everything else
    // (categories, sources, quotes) is a datapoint, never counted as a belief.
    const visBeliefs = beliefs.filter(b => b.kind === 'cluster' && state.visibleClusters.has(b.cluster)).length;
    const visPoints = beliefs.filter(b => b.kind !== 'cluster' && state.visibleClusters.has(b.cluster)).length;

    counter.textContent = `${visBeliefs} beliefs \u00b7 ${visPoints.toLocaleString()} datapoints` + (sectorCount ? ` \u00b7 ${sectorCount} clusters` : '');
  }
  updateCounter();

  return { setTooltip, openPanel, closePanel, setPropagationActive };
}

// ─── helpers ──────────────────────────────────────────────
function el(tag, attrs={}) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  return e;
}

function renderSupportingViewpoints(s) {
  // Splits text on "\n\n" OR on numbered prefixes ("1. ", "2. " …) into a
  // styled list so the panel reads as discrete points instead of a wall.
  if (!s) return '';
  const text = String(s).trim();
  // First try \n\n split (preferred — our generator emits these separators)
  let parts = text.split(/\n\s*\n+/).map(p => p.trim()).filter(Boolean);
  if (parts.length < 2) {
    // Fallback: split on "N. " prefixes when they're in mid-text
    parts = text.split(/(?=\b\d{1,2}\.\s)/).map(p => p.trim()).filter(Boolean);
  }
  if (parts.length < 2) {
    return `<div class="bcm-rationale">${escapeHtml(text)}</div>`;
  }
  const items = parts.map(p => {
    const stripped = p.replace(/^\d{1,2}\.\s*/, '');
    return `<li>${escapeHtml(stripped)}</li>`;
  }).join('');
  return `<ol class="bcm-rationale-list">${items}</ol>`;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"]/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;'
  }[ch]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/'/g, '&#39;'); }

// Display formatting for quotes: capitalize the first letter, wrap verbatim in
// curly quotes, render "(paraphrase) ..." as a labeled paraphrase. Verbatim text
// is unchanged in storage; this only affects presentation.
function fmtQuote(text) {
  let t = String(text || '').trim();
  if (!t) return '';
  t = t.replace(/^["“”'`]+/, '').replace(/["“”'`]+$/, '').trim();
  const pm = t.match(/^\(?\s*paraphrase\s*\)?\s*[:\-—]?\s*/i);
  if (pm) {
    let b = t.slice(pm[0].length).replace(/^["“”'`]+/, '').replace(/["“”'`]+$/, '').trim();
    b = b.charAt(0).toUpperCase() + b.slice(1);
    return '<em class="bcm-paraphrase-mark">paraphrase:</em> ' + escapeHtml(b);
  }
  t = t.replace(/^([a-z])/, m => m.toUpperCase());
  return '“' + escapeHtml(t) + '”';
}

function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return escapeHtml(text);
  return escapeHtml(text.slice(0, i)) + '<mark>' + escapeHtml(text.slice(i, i+q.length)) + '</mark>' + escapeHtml(text.slice(i+q.length));
}
