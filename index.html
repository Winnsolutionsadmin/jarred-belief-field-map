function cssRgb(hex) {
  if (typeof hex === 'string') {
    const m = hex.match(/#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i);
    if (m) return `rgb(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)})`;
    return hex;
  }
  const r = (hex >> 16) & 255, g = (hex >> 8) & 255, b = hex & 255;
  return `rgb(${r},${g},${b})`;
}
function cssRgba(c, a) {
  if (typeof c === 'string') {
    const m = c.match(/#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i);
    if (m) return `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${a})`;
    return c;
  }
  const r = (c >> 16) & 255, g = (c >> 8) & 255, b = c & 255;
  return `rgba(${r},${g},${b},${a})`;
}


// engine/engine.js — Three.js Belief Cluster Map
// Builds the 3D scene, handles all interactions, and delegates DOM chrome to ui.js.




function startBeliefMap({ container, theme, sectors, clusters, beliefs, links, buildUI: customBuildUI, subject, sources }) {
  // ─── Schema normalization ────────────────────────────────────────
  // Supports both:
  //   single-person: conviction, evidence_strength, frequency, emphasis_markers, sources, rationale
  //   population:    popularity, controversy, supporters, opposers
  // Unify on `popularity` for sizing/breathing without losing the originals.
  beliefs.forEach(b => {
    if (b.popularity == null) b.popularity = b.conviction ?? 0.5;
    if (b.controversy == null) b.controversy = (1 - (b.evidence_strength ?? 0.8)) * 0.6;
  });
  // New link types alias onto the existing visual categories.
  const LINK_TYPE_ALIAS = {
    reinforces: 'shared', foundational: 'bridge', derives: 'bridge', rejects: 'opposition',
    hublink: 'bridge', correlation: 'correlation',
    shared: 'shared', opposition: 'opposition', bridge: 'bridge',
  };
  links.forEach(l => { l.visualType = LINK_TYPE_ALIAS[l.type] || l.type; });

  // ─── Recency weighting (macro salience) ────────────────────────────
  // Beliefs talked about recently render larger and brighter, so a visual
  // scan of the field shows what is most pertinent to the subject NOW.
  // Curve: full boost when the newest evidence is under 30 days old, then the
  // boost decays 10% per 30 days back to the normal baseline (fully normal at
  // 300 days; nothing older than 365 days is ever boosted).
  // Age is computed at render time from per-quote dates, so the map stays
  // honest as time passes without a data rebuild.
  // Date precision convention: YYYY-MM-DD exact; YYYY-MM -> the 15th;
  // YYYY -> July 1 (expected value of "sometime that year"). Resolved dates
  // are clamped to now, so a coarse current-year date reads as fresh.
  const NOW_MS = Date.now();
  function parseQuoteDate(s) {
    const m = /^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/.exec((s || '').trim());
    if (!m) return null;
    const y = +m[1];
    if (y < 1990 || y > 2100) return null;
    const mo = m[2] ? +m[2] - 1 : 6;            // YYYY -> July
    const d  = m[3] ? +m[3] : (m[2] ? 15 : 1);  // YYYY-MM -> 15th; YYYY -> Jul 1
    const t = new Date(y, mo, d).getTime();
    return Math.min(t, NOW_MS);                  // never in the future
  }
  function recencyBoost(newestMs) {
    if (newestMs == null) return 0;
    const ageDays = (NOW_MS - newestMs) / 86400000;
    if (ageDays > 365) return 0;
    return Math.max(0, Math.min(1, 1 - 0.10 * Math.floor(ageDays / 30)));
  }
  // Newest evidence date per cluster and per hub, from the quote nodes.
  const newestByCluster = new Map(), newestByHub = new Map();
  beliefs.forEach(b => {
    if (b.kind !== 'quote') return;
    const t = parseQuoteDate(b.quote_data?.date);
    if (t == null) return;
    if (t > (newestByCluster.get(b.cluster) ?? -Infinity)) newestByCluster.set(b.cluster, t);
    if (b.hub && t > (newestByHub.get(b.hub) ?? -Infinity)) newestByHub.set(b.hub, t);
  });
  // Stamp every node with its boost [0..1] before layout/render consume it.
  beliefs.forEach(b => {
    if (b.kind === 'cluster')      b.recencyBoost = recencyBoost(newestByCluster.get(b.cluster));
    else if (b.kind === 'hub')     b.recencyBoost = recencyBoost(newestByHub.get(b.id));
    else if (b.kind === 'quote')   b.recencyBoost = recencyBoost(parseQuoteDate(b.quote_data?.date));
    else                           b.recencyBoost = 0;
  });

  // ─── Source categorization ───────────────────────────────────────
  // Each quote is colored by the KIND of source it came from, so the field
  // reads as "where does this belief's evidence come from."
  const CAT_COLORS = {
    tweet:     0x4eb3ff, // blue
    podcast:   0xb98bff, // purple
    interview: 0x34d399, // green
    press:     0xff9d4c, // orange
    official:  0xf5d76e, // gold
    blog:      0xff6f9c, // pink
    other:     0x9aa7c7, // slate-gray
  };
  const SRC = sources || (typeof window !== 'undefined' && window.SOURCES) || {};
  function categoryOf(sid) {
    const s = SRC[sid] || {};
    const v = (s.venue || '').toLowerCase();
    const t = s.tier || '';
    if (sid === 'tweets-csv' || v.includes('twitter') || v.includes('x /') || v.includes('@')) return 'tweet';
    if (/podcast|on the brink|empire|galaxy brains|arch lending|beckman|defiance|treasuries|brink|libsyn|spotify|soundcloud/.test(v)) return 'podcast';
    if (/testimony|house|senate|committee|occ|comptroller|congress/.test(v)) return 'official';
    if (/anchorage|insights|blog|linkedin pulse/.test(v)) return 'blog';
    if (t === 'T2') return 'interview';
    if (t === 'T4' || t === 'T5') return 'press';
    return 'press';   // no 'Other' bucket (Jarred, 2026-06-10): worst-case fallback is press
  }
  // Stamp every quote belief with its source category + color (used by layout + render).
  // TRUST the data's own category first (build-map-from-db.py derives it from the quote's
  // register, which is always right); the venue-string heuristics above are a FALLBACK for
  // legacy data only. Heuristics-first painted most non-reference subjects slate "other"
  // (their venue strings never matched the reference build's patterns) — fixed 2026-06-10.
  beliefs.forEach(b => {
    if (b.kind === 'quote') {
      const dataCat = b.quote_data?.category;
      const cat = (dataCat && dataCat !== 'other') ? dataCat : categoryOf(b.quote_data?.source_id);
      b.sourceCategory = cat;
      b.catColor = CAT_COLORS[cat] || CAT_COLORS.other;
    }
  });

  // ─── Cross-cluster correlation links ─────────────────────────────
  // The same verbatim statement can support more than one belief cluster.
  // Detect quotes whose normalized text appears under multiple cores and
  // tether those cores together so shared evidence is visible.
  (() => {
    const norm = t => (t || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim().slice(0, 120);
    const byText = new Map();
    beliefs.forEach(b => {
      if (b.kind !== 'quote' || !b.quote_data) return;
      const key = norm(b.quote_data.text || b.quote_data.paraphrase);
      if (key.length < 24) return;
      if (!byText.has(key)) byText.set(key, new Set());
      byText.get(key).add(b.cluster);
    });
    const seen = new Set();
    byText.forEach(coreSet => {
      const cs = [...coreSet];
      if (cs.length < 2) return;
      for (let i = 0; i < cs.length; i++) for (let j = i + 1; j < cs.length; j++) {
        const k = [cs[i], cs[j]].sort().join('|');
        if (seen.has(k)) continue;
        seen.add(k);
        links.push({ source: 'C:' + cs[i], target: 'C:' + cs[j], type: 'correlation', visualType: 'correlation', weight: 0.7 });
      }
    });
  })();

  // ─── Index data ──────────────────────────────────────────────────
  const beliefById = new Map(beliefs.map(b => [b.id, b]));
  const clusterById = new Map(clusters.map(c => [c.id, c]));
  // Filter links to those whose endpoints exist (guard against typos in data)
  const safeLinks = links.filter(l => beliefById.has(l.source) && beliefById.has(l.target));

  // Build neighbor index
  const neighbors = new Map();
  beliefs.forEach(b => neighbors.set(b.id, []));
  safeLinks.forEach(l => {
    neighbors.get(l.source).push({ id: l.target, type: l.type, weight: l.weight, dir: 'out' });
    neighbors.get(l.target).push({ id: l.source, type: l.type, weight: l.weight, dir: 'in' });
  });

  // ─── Layout ─────────────────────────────────────────────────────
  // If sectors are supplied, use the three-tier layout. Otherwise legacy.
  let positions, sectorCenters = null, clusterCentersMap = null;
  if (sectors && sectors.length) {
    const out = layoutBeliefsTiered(sectors, clusters, beliefs);
    positions = out.positions;
    sectorCenters = out.sectorCenters;
    clusterCentersMap = out.clusterCenters;
  } else {
    positions = layoutBeliefs(clusters, beliefs);
  }
  // positions: Map<beliefId, {pos: THREE.Vector3, clusterCenter: THREE.Vector3}>

  // ─── Scene ───────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(theme.bg);
  scene.fog = new THREE.Fog(theme.fog.color, theme.fog.near, theme.fog.far);

  const camera = new THREE.PerspectiveCamera(48, 1, 1, 2000);
  camera.position.set(60, 70, 340);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.78;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);
  renderer.domElement.style.cssText = 'display:block;width:100%;height:100%;outline:none;';

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.rotateSpeed = 0.55;
  controls.zoomSpeed = 0.8;
  controls.panSpeed = 0.6;
  controls.minDistance = 80;
  controls.maxDistance = 2400;
  controls.screenSpacePanning = true;
  controls.panSpeed = 1.0;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.18;

  // ─── Background stars ────────────────────────────────────────────
  const starsGeo = new THREE.BufferGeometry();
  const starN = theme.starDensity;
  const starPositions = new Float32Array(starN * 3);
  const starSizes = new Float32Array(starN);
  for (let i = 0; i < starN; i++) {
    // Distribute on a far sphere shell
    const r = 900 + Math.random() * 200;
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = 2 * Math.PI * Math.random();
    starPositions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPositions[i*3+2] = r * Math.cos(phi);
    starSizes[i] = 0.4 + Math.pow(Math.random(), 6) * 2.4;
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  starsGeo.setAttribute('aSize', new THREE.BufferAttribute(starSizes, 1));
  const starsMat = new THREE.ShaderMaterial({
    uniforms: {
      uColor: { value: new THREE.Color(theme.starColor) },
      uTime: { value: 0 },
    },
    vertexShader: `
      attribute float aSize;
      uniform float uTime;
      varying float vTw;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mv;
        float tw = 0.6 + 0.4 * sin(uTime * 0.6 + position.x * 0.02 + position.y * 0.03);
        vTw = tw;
        gl_PointSize = aSize * tw * (300.0 / -mv.z);
      }`,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vTw;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        if (d > 0.5) discard;
        float a = smoothstep(0.5, 0.0, d) * vTw;
        gl_FragColor = vec4(uColor, a);
      }`,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const starsField = new THREE.Points(starsGeo, starsMat);
  scene.add(starsField);

  // ─── Sector nebulae (3-tier) or Cluster nebulae (legacy) ───────
  // A diffuse glow at each top-level group center, so regions read clearly.
  const nebulaTex = makeRadialTexture();
  const nebulaGroup = new THREE.Group();
  const clusterMeta = new Map(); // clusterId -> { center, color }

  if (sectors && sectorCenters) {
    // 3-tier: nebula at each SECTOR center, larger and dimmer
    sectors.forEach(s => {
      const center = sectorCenters.get(s.id);
      const col = new THREE.Color().setHSL(s.hue, 0.55, 0.5);
      const sprMat = new THREE.SpriteMaterial({
        map: nebulaTex, color: col, transparent: true,
        opacity: theme.nebulaIntensity * 0.7,
        depthWrite: false, blending: THREE.AdditiveBlending,
      });
      const sprite = new THREE.Sprite(sprMat);
      sprite.position.copy(center);
      sprite.scale.setScalar(300);
      nebulaGroup.add(sprite);
    });
    // Cluster meta map points at the layout-derived cluster centers
    clusters.forEach(c => {
      const center = clusterCentersMap.get(c.id) || new THREE.Vector3();
      const col = new THREE.Color().setHSL(c.hue ?? 0.6, 0.55, 0.5);
      clusterMeta.set(c.id, { center, color: col });
    });
  } else {
    // Legacy 2-tier: nebula at each cluster center
    clusters.forEach((c, i) => {
      const center = clusterCenter(i, clusters.length);
      const col = new THREE.Color().setHSL(c.hue, 0.55, 0.5);
      const sprMat = new THREE.SpriteMaterial({
        map: nebulaTex, color: col, transparent: true,
        opacity: theme.nebulaIntensity,
        depthWrite: false, blending: THREE.AdditiveBlending,
      });
      const sprite = new THREE.Sprite(sprMat);
      sprite.position.copy(center);
      sprite.scale.setScalar(180);
      nebulaGroup.add(sprite);
      clusterMeta.set(c.id, { center, color: col });
    });
  }
  scene.add(nebulaGroup);

  // ─── Nodes (beliefs) ─────────────────────────────────────────────
  // Each node is a small THREE.Group: { mesh: sphere, halo: sprite }
  const nodeGroup = new THREE.Group();
  const nodeRecords = []; // { id, group, mesh, halo, basePos, baseScale, color, cluster }
  const haloTex = makeRadialTexture(0.0, 0.95);

  beliefs.forEach((b, i) => {
    const meta = clusterMeta.get(b.cluster);
    const pos = positions.get(b.id);
    if (!pos || !meta) return;

    // Color: cluster cores use their assigned cluster color; hubs + quotes
    // use their source-category color. Falls back to sector hue.
    let baseColor;
    if (b.kind === 'cluster' && b.coreColor) {
      baseColor = new THREE.Color(b.coreColor);
    } else if ((b.kind === 'quote' || b.kind === 'hub') && b.catColor != null) {
      baseColor = new THREE.Color(b.catColor);
    } else {
      baseColor = new THREE.Color().setHSL(
        (clusterById.get(b.cluster)?.hue ?? 0.6),
        theme.nodeSaturation,
        Math.min(0.78, theme.nodeLightness + 0.12)
      );
    }
    // Desaturate data-driven colors toward a muted, techy palette (no candy).
    { const _h = {}; baseColor.getHSL(_h);
      baseColor.setHSL(_h.h, Math.max(0, _h.s - (theme.nodeDesaturate || 0)), Math.min(0.6, _h.l)); }

    // Sizes: evidence-scaled cores, strength-scaled quotes.
    let r;
    if (b.kind === 'cluster') {
      r = 7 + Math.sqrt(b.frequency ?? 1) * 1.7;
    } else if (b.kind === 'hub') {
      const tier = { category: 1.0, source: 0.72 }[b.hubType] ?? 1.0;
      r = (2.4 + Math.sqrt(b.frequency ?? 1) * 0.9) * tier;
    } else if (b.kind === 'quote') {
      const s = b.strength01 ?? 0.4;
      r = 0.7 + s * 2.6;
    } else {
      r = 1.3 + Math.pow(b.popularity, 0.7) * 2.6;
    }
    // Recency: recently-evidenced beliefs render larger (see boost curve above).
    const rb = b.recencyBoost || 0;
    r *= 1 + (b.kind === 'cluster' ? 0.35 : b.kind === 'hub' ? 0.25 : 0.30) * rb;

    // Faceted low-poly geometry — techy crystal nodes, not smooth gumballs.
    const detail = b.kind === 'cluster' ? 2 : (b.kind === 'hub' ? 1 : 0);
    const geo = new THREE.IcosahedronGeometry(r, detail);
    let mat;
    let edgeLines = null;
    // Recency brightens: fresh evidence lifts emissive glow and lattice opacity.
    const emissiveBoost = 1 + 1.1 * rb;
    if (b.kind === 'cluster') {
      // Glass data-hub: translucent body + bright wireframe lattice.
      mat = new THREE.MeshStandardMaterial({
        color: baseColor, emissive: baseColor, emissiveIntensity: 0.26 * emissiveBoost,
        roughness: 0.9, metalness: 0.0, flatShading: true,
        transparent: true, opacity: Math.min(0.5, 0.26 * (1 + 0.5 * rb)), depthWrite: false,
      });
      const wireGeo = new THREE.IcosahedronGeometry(r * 1.05, 2);
      const wireMat = new THREE.MeshBasicMaterial({ color: baseColor, wireframe: true, transparent: true, opacity: Math.min(1, 0.55 * (1 + 0.6 * rb)) });
      edgeLines = new THREE.Mesh(wireGeo, wireMat);
      edgeLines.position.copy(pos.pos);
    } else if (b.kind === 'hub') {
      // Sub-cluster node: small faceted, matte, wireframe edge.
      mat = new THREE.MeshStandardMaterial({
        color: baseColor, emissive: baseColor, emissiveIntensity: 0.38 * emissiveBoost,
        roughness: 0.8, metalness: 0.05, flatShading: true,
      });
      const wireGeo = new THREE.IcosahedronGeometry(r * 1.08, 1);
      const wireMat = new THREE.MeshBasicMaterial({ color: baseColor, wireframe: true, transparent: true, opacity: Math.min(1, 0.4 * (1 + 0.6 * rb)) });
      edgeLines = new THREE.Mesh(wireGeo, wireMat);
      edgeLines.position.copy(pos.pos);
    } else {
      // Quote node: tiny faceted crystal, matte, low glow.
      mat = new THREE.MeshStandardMaterial({
        color: baseColor, emissive: baseColor, emissiveIntensity: 0.42 * emissiveBoost,
        roughness: 0.75, metalness: 0.0, flatShading: true,
      });
    }
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos.pos);

    // halo sprite — small, matches node color, no giant glow.
    // Recency widens and intensifies the halo so fresh beliefs read as lit.
    const haloColor = baseColor.clone();
    const haloScaleFactor = (b.kind === 'cluster' ? 1.5 : 1.6) * (1 + 0.35 * rb);
    const haloOpacity    = Math.min(1, (b.kind === 'cluster' ? 0.3 : 0.22) * (1 + 0.9 * rb)) * theme.haloIntensity;
    const haloMat = new THREE.SpriteMaterial({
      map: haloTex,
      color: haloColor,
      transparent: true,
      opacity: haloOpacity,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const halo = new THREE.Sprite(haloMat);
    halo.position.copy(pos.pos);
    halo.scale.setScalar(r * haloScaleFactor);

    const group = new THREE.Group();
    group.add(mesh);
    if (edgeLines) group.add(edgeLines);
    group.add(halo);
    nodeGroup.add(group);

    nodeRecords.push({
      id: b.id, belief: b, group, mesh, halo, edgeLines,
      basePos: pos.pos.clone(),
      baseScale: r,
      baseHaloScale: r * haloScaleFactor,
      baseHaloOpacity: haloOpacity,
      baseEmissive: (b.kind === 'cluster' ? 0.26 : (b.kind === 'hub' ? 0.38 : 0.42)) * emissiveBoost,
      recencyBoost: rb,
      color: baseColor,
      clusterCenter: meta.center,
      kind: b.kind,
      // staggered entrance: clusters first, then hubs, then quotes
      appearDelay: (b.kind === 'cluster' ? 0 : b.kind === 'hub' ? 0.5 : 1.0) + Math.random() * 1.4,
      appear: 0,
    });
    // start hidden for the entrance animation
    mesh.scale.setScalar(0.001);
    if (edgeLines) edgeLines.scale.setScalar(0.001);
    halo.scale.setScalar(0.001);
  });
  scene.add(nodeGroup);

  // Map for fast lookup
  const nodeById = new Map(nodeRecords.map(r => [r.id, r]));

  // ─── Links ───────────────────────────────────────────────────────
  // Build per-type LineSegments. Each link is a curved cubic with N segments.
  const SEG = 22; // segments per link
  const linkRecords = []; // { l, indexStart, indexCount, type, materialKey }
  const typeLines = {};

  const linkTypes = ['correlation', 'shared', 'bridge', 'opposition'];
  for (const t of linkTypes) {
    const cfg = theme.links[t];
    const ls = safeLinks.filter(l => l.visualType === t);
    if (!ls.length) continue;

    const positions = new Float32Array(ls.length * SEG * 2 * 3); // 2 endpoints per seg, 3 coords
    const baseAlphas = new Float32Array(ls.length * SEG * 2);
    const alphas = new Float32Array(ls.length * SEG * 2);
    let p = 0, a = 0;
    ls.forEach((l, li) => {
      const na = nodeById.get(l.source), nb = nodeById.get(l.target);
      if (!na || !nb) return;   // dangling link endpoint (filtered/unpositioned node)
      const a1 = na.basePos;
      const b1 = nb.basePos;
      const mid = a1.clone().add(b1).multiplyScalar(0.5);
      // Near-straight lines (tiny bend) — no big arcs.
      const outward = mid.clone().normalize().multiplyScalar(-a1.distanceTo(b1) * 0.02);
      const ctrl = mid.clone().add(outward);
      // Sample curve
      const pts = [];
      for (let s = 0; s <= SEG; s++) {
        const t = s / SEG;
        // quadratic Bezier
        const u = 1 - t;
        const x = u*u * a1.x + 2*u*t * ctrl.x + t*t * b1.x;
        const y = u*u * a1.y + 2*u*t * ctrl.y + t*t * b1.y;
        const z = u*u * a1.z + 2*u*t * ctrl.z + t*t * b1.z;
        pts.push(x, y, z);
      }
      // Build segments (s,s+1)
      const startIdx = li * SEG * 2;
      for (let s = 0; s < SEG; s++) {
        positions[p++] = pts[s*3];
        positions[p++] = pts[s*3+1];
        positions[p++] = pts[s*3+2];
        positions[p++] = pts[(s+1)*3];
        positions[p++] = pts[(s+1)*3+1];
        positions[p++] = pts[(s+1)*3+2];
        // dashed pattern (binary) for opposition; otherwise fade middle softly
        let baseAlpha;
        if (cfg.dashed) {
          const phase = (s % 4) < 2 ? 1.0 : 0.0;
          baseAlpha = cfg.alpha * phase * (0.6 + l.weight * 0.6);
        } else {
          // Soften endpoints so the line emerges from nodes
          const edge = Math.min(s, SEG - 1 - s) / (SEG * 0.5);
          baseAlpha = cfg.alpha * (0.5 + 0.5 * Math.min(1, edge * 2)) * (0.5 + l.weight * 0.8);
        }
        baseAlphas[a] = baseAlpha;
        baseAlphas[a+1] = baseAlpha;
        alphas[a] = baseAlpha;
        alphas[a+1] = baseAlpha;
        a += 2;
      }
      linkRecords.push({ link: l, type: t, indexStart: startIdx, indexCount: SEG * 2 });
    });

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: new THREE.Color(cfg.color) },
        uGlobal: { value: 1.0 },
      },
      vertexShader: `
        attribute float aAlpha;
        varying float vAlpha;
        void main() {
          vAlpha = aAlpha;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uGlobal;
        varying float vAlpha;
        void main() {
          gl_FragColor = vec4(uColor, vAlpha * uGlobal);
        }`,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const line = new THREE.LineSegments(geo, mat);
    scene.add(line);
    typeLines[t] = { line, geo, mat, baseAlphas, alphas };
  }

  // ─── Peer relation arcs (cross-subject overlay) ──────────────────
  // Other people's belief fields, related to this subject's beliefs, render
  // as labeled peer nodes on the field's periphery with dotted arcs to the
  // engaged cluster cores: green = convergent, red = divergent, slate =
  // adjacent. Data: window.BELIEF_RELATIONS (derived/beliefs-relations.js,
  // built from committed PUBLIC clusters only by pipeline/build-relations.mjs
  // + the polarity judge). Absent data = no overlay; window.BELIEF_RELATIONS_OFF
  // disables it without a rebuild.
  (() => {
    const REL = (typeof window !== 'undefined' && !window.BELIEF_RELATIONS_OFF && window.BELIEF_RELATIONS) || null;
    if (!REL || !REL.bySubject) return;
    const subjName = (subject && subject.name) || '';
    const myId = REL.names ? REL.names[subjName] : null;
    const mine = myId && REL.bySubject[myId];
    if (!mine || !mine.peers || !mine.peers.length) return;

    const REL_STYLE = {
      CONVERGENT: { color: 0x35e07c, dashed: false, alpha: 0.55 },
      DIVERGENT:  { color: 0xff5a5a, dashed: true,  alpha: 0.65 },
      ADJACENT:   { color: 0x9aa7c7, dashed: true,  alpha: 0.30 },
    };

    // Field radius: peers sit beyond the farthest core.
    let maxR = 0;
    nodeRecords.forEach(r => { if (r.id.startsWith('C:')) maxR = Math.max(maxR, r.basePos.length()); });
    const peerR = maxR * 1.45 + 60;

    function makeLabelSprite(text, colorCss) {
      const c = document.createElement('canvas');
      const ctx = c.getContext('2d');
      const font = '600 34px Inter, system-ui, sans-serif';
      ctx.font = font;
      const w = Math.ceil(ctx.measureText(text).width) + 28;
      c.width = w; c.height = 56;
      const ctx2 = c.getContext('2d');
      ctx2.font = font;
      ctx2.fillStyle = 'rgba(8,12,24,0.72)';
      ctx2.fillRect(0, 0, w, 56);
      ctx2.fillStyle = colorCss;
      ctx2.textBaseline = 'middle';
      ctx2.fillText(text, 14, 30);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
      spr.scale.set(w * 0.16, 9, 1);
      return spr;
    }

    const peerGroup = new THREE.Group();
    const PEER_HUES = [0.55, 0.12, 0.78, 0.33, 0.92, 0.45];
    const SEGP = 24;

    mine.peers.forEach((peer, pi) => {
      const rels = (peer.relations || []).filter(r => REL_STYLE[r.relation]);
      if (!rels.length) return;

      // Position: azimuth spread, biased toward the mean direction of the
      // engaged cores so arcs stay short and readable.
      const mean = new THREE.Vector3();
      let n = 0;
      rels.forEach(r => {
        const core = nodeById.get('C:' + r.belief_id);
        if (core) { mean.add(core.basePos); n++; }
      });
      if (!n) return;
      mean.multiplyScalar(1 / n);
      if (mean.length() < 1) mean.set(1, 0, 0);
      const jitter = (pi - (mine.peers.length - 1) / 2) * 0.5;
      const dir = mean.clone().normalize();
      const azim = Math.atan2(dir.z, dir.x) + jitter * 0.45;
      const pos = new THREE.Vector3(
        Math.cos(azim) * peerR,
        dir.y * peerR * 0.35 + (pi % 2 ? 28 : -22),
        Math.sin(azim) * peerR
      );

      const hue = PEER_HUES[pi % PEER_HUES.length];
      const col = new THREE.Color().setHSL(hue, 0.65, 0.62);
      const mesh = new THREE.Mesh(
        new THREE.IcosahedronGeometry(7.5, 1),
        new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.55, roughness: 0.4 })
      );
      mesh.position.copy(pos);
      peerGroup.add(mesh);
      const label = makeLabelSprite(peer.name || peer.subject, '#' + col.getHexString());
      label.position.copy(pos).add(new THREE.Vector3(0, 14, 0));
      peerGroup.add(label);

      // Arcs: one dotted Bezier per relation, bowing outward.
      rels.forEach(r => {
        const core = nodeById.get('C:' + r.belief_id);
        if (!core) return;
        const style = REL_STYLE[r.relation];
        const a1 = core.basePos, b1 = pos;
        const mid = a1.clone().add(b1).multiplyScalar(0.5);
        const bow = mid.clone().normalize().multiplyScalar(a1.distanceTo(b1) * 0.18 + 18);
        const ctrl = mid.clone().add(bow);
        const pts = [];
        for (let s = 0; s <= SEGP; s++) {
          const t = s / SEGP, u = 1 - t;
          pts.push(new THREE.Vector3(
            u*u*a1.x + 2*u*t*ctrl.x + t*t*b1.x,
            u*u*a1.y + 2*u*t*ctrl.y + t*t*b1.y,
            u*u*a1.z + 2*u*t*ctrl.z + t*t*b1.z
          ));
        }
        const segPts = [];
        for (let s = 0; s < SEGP; s++) {
          if (style.dashed && s % 3 === 2) continue;  // dotted: drop every third segment
          segPts.push(pts[s], pts[s + 1]);
        }
        const geo = new THREE.BufferGeometry().setFromPoints(segPts);
        const strength = Math.max(0.25, Math.min(1, (r.confidence ?? 0.7) * (0.6 + (r.score ?? 0.5) * 0.6)));
        const mat = new THREE.LineBasicMaterial({
          color: style.color, transparent: true, opacity: style.alpha * strength,
          depthWrite: false, blending: THREE.AdditiveBlending,
        });
        peerGroup.add(new THREE.LineSegments(geo, mat));
      });
    });

    scene.add(peerGroup);
  })();

  // ─── Lights ──────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x6a7ab0, 0.35));
  const key = new THREE.DirectionalLight(0xffffff, 0.6);
  key.position.set(200, 280, 200);
  scene.add(key);
  const fill = new THREE.DirectionalLight(new THREE.Color(theme.accent), 0.4);
  fill.position.set(-200, -120, 80);
  scene.add(fill);

  // ─── Interaction state ───────────────────────────────────────────
  const state = {
    selectedId: null,
    hoverId: null,
    visibleClusters: new Set(clusters.map(c => c.id)),
    visibleLinkTypes: new Set(['shared','opposition','bridge','correlation']),
    minStrength: 0,
    propagation: null, // { from, depth, frontier, visited, t, speed }
    drift: true,
  };

  // ─── Raycaster ───────────────────────────────────────────────────
  const raycaster = new THREE.Raycaster();
  raycaster.params.Points = { threshold: 1.5 };
  const pointer = new THREE.Vector2(-2, -2);

  function pickNode() {
    raycaster.setFromCamera(pointer, camera);
    const meshes = nodeRecords.filter(r => r.group.visible).map(r => r.mesh);
    const hits = raycaster.intersectObjects(meshes, false);
    if (!hits.length) return null;
    const hit = hits[0];
    return nodeRecords.find(r => r.mesh === hit.object);
  }

  // ─── UI ──────────────────────────────────────────────────────────
  const uiBuilder = customBuildUI || buildUI;
  const ui = uiBuilder({
    container, theme, sectors, clusters, beliefs, neighbors, beliefById, clusterById,
    onSelect: id => selectNode(id),
    onHover:  id => hoverNode(id),
    onFilter: () => applyFilters(),
    onPlayPropagation: id => startPropagation(id),
    onResetCamera: () => resetCamera(),
    onFitAll: () => fitAll(),
    onToggleAutoRotate: v => { controls.autoRotate = v; },
    state,
    subject,
  });

  // ─── Selection / hover logic ─────────────────────────────────────
  function neighborSet(id) {
    const s = new Set([id]);
    (neighbors.get(id) || []).forEach(n => s.add(n.id));
    return s;
  }

  function applyFilters() {
    // Cluster visibility + min-strength filter
    nodeRecords.forEach(r => {
      const inCluster = state.visibleClusters.has(r.belief.cluster);
      const strong = (r.belief.popularity + (1 - r.belief.controversy)) * 0.5 >= state.minStrength;
      r.group.visible = inCluster && strong;
    });
    refreshLinkAlphas();
  }

  function refreshLinkAlphas() {
    // Per-link visibility based on cluster + type + selection/hover/propagation
    const focusId = state.selectedId || state.hoverId;
    const propVisited = state.propagation ? state.propagation.visited : null;
    Object.entries(typeLines).forEach(([t, tl]) => {
      const visibleType = state.visibleLinkTypes.has(t);
      const arr = tl.geo.attributes.aAlpha.array;
      const baseArr = tl.baseAlphas;
      // Find this type's link records
      let writeIdx = 0;
      const ls = safeLinks.filter(l => l.visualType === t);
      ls.forEach((l, li) => {
        const a = nodeById.get(l.source);
        const b = nodeById.get(l.target);
        const aVis = a.group.visible;
        const bVis = b.group.visible;
        let mul = (visibleType && aVis && bVis) ? 1 : 0;
        if (focusId) {
          const touches = (l.source === focusId || l.target === focusId);
          mul *= touches ? 2.3 : 0.18;
        }
        if (propVisited) {
          const touches = (propVisited.has(l.source) && propVisited.has(l.target));
          if (touches) mul = Math.max(mul, 1.6);
          else mul *= 0.5;
        }
        for (let s = 0; s < SEG; s++) {
          arr[writeIdx]   = baseArr[writeIdx]   * mul;
          arr[writeIdx+1] = baseArr[writeIdx+1] * mul;
          writeIdx += 2;
        }
      });
      tl.geo.attributes.aAlpha.needsUpdate = true;
    });
  }

  function hoverNode(id) {
    if (state.hoverId === id) return;
    state.hoverId = id;
    nodeRecords.forEach(r => {
      const isHover = r.id === id;
      const inFocus = state.selectedId
        ? neighborSet(state.selectedId).has(r.id)
        : true;
      const dim = state.selectedId && !inFocus ? 0.35 : 1;
      r.mesh.material.emissiveIntensity = (isHover ? 2.0 : r.baseEmissive) * dim;
      r.halo.material.opacity = (isHover ? 1.0 : r.baseHaloOpacity) * dim;
    });
    refreshLinkAlphas();
    applyHighlight(); // an active comparison highlight wins over hover dimming
    ui.setTooltip(id ? beliefById.get(id) : null);
  }

  function selectNode(id) {
    state.selectedId = id;
    state.propagation = null;
    if (id) {
      const r = nodeById.get(id);
      if (r) flyTo(r.basePos);
      ui.openPanel(id);
    } else {
      ui.closePanel();
    }
    // Update emphasis on all nodes
    const focus = id ? neighborSet(id) : null;
    nodeRecords.forEach(r => {
      const inFocus = focus ? focus.has(r.id) : true;
      r.mesh.material.emissiveIntensity = r.baseEmissive * (inFocus ? 1 : 0.25);
      r.halo.material.opacity = r.baseHaloOpacity * (inFocus ? 1 : 0.2);
    });
    refreshLinkAlphas();
    applyHighlight(); // an active comparison highlight wins over selection dimming
  }

  function flyTo(targetPos) {
    // Move camera target toward selected node, keep distance.
    const dir = camera.position.clone().sub(controls.target).normalize();
    const newTarget = targetPos.clone();
    const dist = Math.max(120, Math.min(220, camera.position.distanceTo(controls.target)));
    flyAnim.from = { tgt: controls.target.clone(), pos: camera.position.clone() };
    flyAnim.to = { tgt: newTarget, pos: newTarget.clone().add(dir.multiplyScalar(dist)) };
    flyAnim.t = 0;
    flyAnim.active = true;
  }
  const flyAnim = { active: false, t: 0, from: null, to: null };

  function resetCamera() {
    flyAnim.from = { tgt: controls.target.clone(), pos: camera.position.clone() };
    flyAnim.to = { tgt: new THREE.Vector3(0,0,0), pos: new THREE.Vector3(60, 70, 340) };
    flyAnim.t = 0;
    flyAnim.active = true;
  }

  // Frame the entire field: compute bounding sphere of all cluster cores and
  // pull the camera back far enough to see everything.
  function fitAll() {
    const box = new THREE.Box3();
    let any = false;
    nodeRecords.forEach(r => { if (r.kind === 'cluster') { box.expandByPoint(r.basePos); any = true; } });
    if (!any) { resetCamera(); return; }
    const center = box.getCenter(new THREE.Vector3());
    const radius = Math.max(box.getSize(new THREE.Vector3()).length() * 0.6, 200);
    const dist = radius / Math.tan((camera.fov * Math.PI / 180) / 2) * 1.15;
    const dir = camera.position.clone().sub(controls.target).normalize();
    if (dir.lengthSq() < 0.001) dir.set(0.3, 0.4, 1).normalize();
    flyAnim.from = { tgt: controls.target.clone(), pos: camera.position.clone() };
    flyAnim.to = { tgt: center.clone(), pos: center.clone().add(dir.multiplyScalar(dist)) };
    flyAnim.t = 0;
    flyAnim.active = true;
  }

  // ─── Propagation playback ───────────────────────────────────────
  function startPropagation(fromId) {
    selectNode(fromId);
    state.propagation = {
      from: fromId,
      visited: new Set([fromId]),
      frontier: [{ id: fromId, depth: 0 }],
      maxDepth: 3,
      t: 0,
      stepInterval: 0.5, // seconds per ring
      lastStep: 0,
    };
    ui.setPropagationActive(true);
  }
  function stepPropagation(now) {
    const p = state.propagation;
    if (!p) return;
    p.t += now;
    if (p.t < p.lastStep + p.stepInterval) return;
    p.lastStep = p.t;
    const nextFrontier = [];
    for (const f of p.frontier) {
      if (f.depth >= p.maxDepth) continue;
      const ns = neighbors.get(f.id) || [];
      for (const n of ns) {
        if (p.visited.has(n.id)) continue;
        if (n.type === 'correlation') continue; // skip subtle ones for clarity
        p.visited.add(n.id);
        nextFrontier.push({ id: n.id, depth: f.depth + 1 });
        // pulse
        const rec = nodeById.get(n.id);
        if (rec) rec._propPulse = 1.0;
      }
    }
    p.frontier = nextFrontier;
    refreshLinkAlphas();
    if (!nextFrontier.length && p.t > p.lastStep + p.stepInterval * 1.5) {
      state.propagation = null;
      ui.setPropagationActive(false);
      refreshLinkAlphas();
      // Restore emphasis
      selectNode(state.selectedId);
    }
  }

  // ─── Pointer events ─────────────────────────────────────────────
  let dragStart = null;
  renderer.domElement.addEventListener('pointerdown', e => {
    dragStart = { x: e.clientX, y: e.clientY };
  });
  renderer.domElement.addEventListener('pointermove', e => {
    const rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const r = pickNode();
    hoverNode(r ? r.id : null);
    renderer.domElement.style.cursor = r ? 'pointer' : 'grab';
  });
  renderer.domElement.addEventListener('pointerup', e => {
    if (!dragStart) return;
    const dx = Math.abs(e.clientX - dragStart.x);
    const dy = Math.abs(e.clientY - dragStart.y);
    dragStart = null;
    if (dx > 4 || dy > 4) return; // was a drag
    const r = pickNode();
    if (r) selectNode(r.id);
    else if (state.selectedId) selectNode(null);
  });

  // ─── Resize ─────────────────────────────────────────────────────
  function resize() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  const ro = new ResizeObserver(resize);
  ro.observe(container);
  resize();

  // ─── Animation loop ─────────────────────────────────────────────
  const clock = new THREE.Clock();
  let frame = 0;
  function tick() {
    frame = requestAnimationFrame(tick);
    const dt = clock.getDelta();
    const t = clock.elapsedTime;
    starsMat.uniforms.uTime.value = t;

    // subtle node drift (each cluster rotates slowly about its center)
    if (state.drift) {
      const ang = dt * 0.04;
      for (const r of nodeRecords) {
        // rotate basePos around clusterCenter, around Y axis local to cluster
        const rel = r.basePos.clone().sub(r.clusterCenter);
        rel.applyAxisAngle(_yAxis, ang * (0.5 + (r.belief.controversy)));
        r.basePos.copy(r.clusterCenter.clone().add(rel));
        r.group.position.set(0,0,0);
        r.mesh.position.copy(r.basePos);
        if (r.edgeLines) r.edgeLines.position.copy(r.basePos);
        r.halo.position.copy(r.basePos);
        // entrance animation: ease appear 0→1 after each node's delay
        if (r.appear < 1) {
          if (t > r.appearDelay) {
            r.appear = Math.min(1, r.appear + dt * 1.8);
          }
        }
        const ap = r.appear < 1 ? (r.appear * r.appear * (3 - 2 * r.appear)) : 1; // smoothstep
        // breathing scale
        const breath = 1 + 0.04 * Math.sin(t * (0.7 + r.belief.popularity) + r.basePos.x * 0.01);
        const hl = r._hlScale || 1; // comparison-highlight boost (setHighlight)
        r.mesh.scale.setScalar(Math.max(0.001, breath * ap * hl));
        r.halo.scale.setScalar(r.baseHaloScale * breath * ap);
        if (r.edgeLines) r.edgeLines.scale.setScalar(Math.max(0.001, ap * hl));
        // Gentle tumble; keep wireframe shell aligned to its core
        r.mesh.rotation.y += dt * 0.08 * (0.6 + r.belief.popularity * 0.4);
        if (r.edgeLines) r.edgeLines.rotation.copy(r.mesh.rotation);
        // propagation pulse decay
        if (r._propPulse) {
          r.mesh.material.emissiveIntensity = r.baseEmissive + r._propPulse * 2.0;
          r._propPulse *= 0.96;
          if (r._propPulse < 0.02) r._propPulse = 0;
        }
      }
      // Rebuild line positions only periodically for perf (every 6 frames)
      if ((frame % 6) === 0) rebuildLineGeometry();
    }

    // Propagation step
    if (state.propagation) stepPropagation(dt);

    // Camera fly anim
    if (flyAnim.active) {
      flyAnim.t = Math.min(1, flyAnim.t + dt * 1.2);
      const k = easeInOutCubic(flyAnim.t);
      controls.target.lerpVectors(flyAnim.from.tgt, flyAnim.to.tgt, k);
      camera.position.lerpVectors(flyAnim.from.pos, flyAnim.to.pos, k);
      if (flyAnim.t >= 1) flyAnim.active = false;
    }

    controls.update();
    renderer.render(scene, camera);
  }
  tick();

  function rebuildLineGeometry() {
    // Recompute positions for each link from current node positions.
    for (const [t, tl] of Object.entries(typeLines)) {
      const arr = tl.geo.attributes.position.array;
      const ls = safeLinks.filter(l => l.visualType === t);
      let p = 0;
      ls.forEach(l => {
        const a1 = nodeById.get(l.source).basePos;
        const b1 = nodeById.get(l.target).basePos;
        const mid = a1.clone().add(b1).multiplyScalar(0.5);
        const outward = mid.clone().normalize().multiplyScalar(-a1.distanceTo(b1) * 0.02);
        const ctrl = mid.clone().add(outward);
        const prev = new THREE.Vector3();
        const cur = new THREE.Vector3();
        for (let s = 0; s <= SEG; s++) {
          const tau = s / SEG;
          const u = 1 - tau;
          cur.set(
            u*u*a1.x + 2*u*tau*ctrl.x + tau*tau*b1.x,
            u*u*a1.y + 2*u*tau*ctrl.y + tau*tau*b1.y,
            u*u*a1.z + 2*u*tau*ctrl.z + tau*tau*b1.z
          );
          if (s === 0) { prev.copy(cur); continue; }
          arr[p++] = prev.x; arr[p++] = prev.y; arr[p++] = prev.z;
          arr[p++] = cur.x;  arr[p++] = cur.y;  arr[p++] = cur.z;
          prev.copy(cur);
        }
      });
      tl.geo.attributes.position.needsUpdate = true;
    }
  }

  // ─── Comparison highlight (additive API; used by the Convergence Comparator) ──
  // setHighlight(ids, hex): the given node ids glow in `hex`, scale up, and render
  // x-ray (visible through the cluster); everything else dims, links fade.
  // clearHighlight() restores the untouched-map state exactly.
  const highlight = { ids: null, color: 0xffffff };
  function _saveMatState(r) {
    if (r._matSaved) return;
    r._matSaved = {
      transparent: r.mesh.material.transparent,
      opacity: r.mesh.material.opacity,
      depthTest: r.mesh.material.depthTest,
      edgeOpacity: r.edgeLines ? r.edgeLines.material.opacity : null,
      edgeDepthTest: r.edgeLines ? r.edgeLines.material.depthTest : null,
    };
  }
  function applyHighlight() {
    if (!highlight.ids) return;
    const ids = highlight.ids;
    nodeRecords.forEach(r => {
      _saveMatState(r);
      const isM = ids.has(r.id);
      const m = r.mesh.material;
      m.transparent = true;
      m.opacity = isM ? Math.max(0.92, r._matSaved.opacity) : Math.min(r._matSaved.opacity, 1) * 0.10;
      m.depthTest = !isM;
      m.needsUpdate = true;
      r.mesh.renderOrder = isM ? 10 : 0;
      m.emissive.copy(isM ? new THREE.Color(highlight.color) : r.color);
      m.emissiveIntensity = isM ? 1.15 : r.baseEmissive * 0.25;
      r.halo.material.opacity = isM ? r.baseHaloOpacity : 0;
      if (r.edgeLines) {
        const em = r.edgeLines.material;
        em.opacity = isM ? Math.max(0.85, r._matSaved.edgeOpacity ?? 0) : (r._matSaved.edgeOpacity ?? 0) * 0.08;
        em.depthTest = !isM;
        em.color.copy(isM ? new THREE.Color(highlight.color) : r.color);
        r.edgeLines.renderOrder = isM ? 11 : 0;
      }
      r._hlScale = isM ? 1.5 : 1;
    });
    Object.values(typeLines).forEach(tl => { tl.mat.uniforms.uGlobal.value = 0.15; });
  }
  function setHighlight(ids, colorHex) {
    if (!ids || !ids.length) { clearHighlight(); return; }
    highlight.ids = new Set(ids);
    highlight.color = colorHex ?? 0xffffff;
    applyHighlight();
  }
  function clearHighlight() {
    if (!highlight.ids) return;
    highlight.ids = null;
    nodeRecords.forEach(r => {
      if (!r._matSaved) return;
      const m = r.mesh.material;
      m.transparent = r._matSaved.transparent;
      m.opacity = r._matSaved.opacity;
      m.depthTest = r._matSaved.depthTest;
      m.needsUpdate = true;
      r.mesh.renderOrder = 0;
      m.emissive.copy(r.color);
      m.emissiveIntensity = r.baseEmissive;
      r.halo.material.opacity = r.baseHaloOpacity;
      if (r.edgeLines) {
        const em = r.edgeLines.material;
        em.opacity = r._matSaved.edgeOpacity ?? em.opacity;
        em.depthTest = r._matSaved.edgeDepthTest ?? true;
        em.color.copy(r.color);
        r.edgeLines.renderOrder = 0;
      }
      r._hlScale = 1;
    });
    Object.values(typeLines).forEach(tl => { tl.mat.uniforms.uGlobal.value = 1.0; });
  }
  // Screen-space position of a node (CSS px within the container), or null if
  // behind the camera / hidden. For external label layers.
  function projectNode(id) {
    const r = nodeById.get(id);
    if (!r || !r.group.visible) return null;
    const v = r.mesh.getWorldPosition(new THREE.Vector3()).project(camera);
    if (v.z > 1) return null;
    const rect = renderer.domElement.getBoundingClientRect();
    return { x: (v.x + 1) / 2 * rect.width, y: (-v.y + 1) / 2 * rect.height };
  }

  // ─── Public API ─────────────────────────────────────────────────
  return {
    selectNode, hoverNode, resetCamera, startPropagation,
    setHighlight, clearHighlight, projectNode,
    camera, controls,
    setAutoRotate: v => { controls.autoRotate = v; },
    setDrift: v => { state.drift = v; },
    destroy: () => {
      cancelAnimationFrame(frame);
      ro.disconnect();
      renderer.dispose();
      container.removeChild(renderer.domElement);
    },
  };
}

// ─── helpers ─────────────────────────────────────────────────────
const _yAxis = new THREE.Vector3(0, 1, 0);

function easeInOutCubic(x) {
  return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2, 3) / 2;
}

function clusterCenter(i, total) {
  // Fibonacci sphere of cluster centers, radius 180
  const R = 180;
  const phi = Math.PI * (3 - Math.sqrt(5));
  const y = 1 - (i / Math.max(1, total - 1)) * 2;
  const r = Math.sqrt(1 - y*y);
  const theta = phi * i;
  return new THREE.Vector3(Math.cos(theta)*r*R, y*R*0.6, Math.sin(theta)*r*R);
}

function makeRadialTexture(innerStop=0.0, outerStop=1.0) {
  const size = 256;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, size*innerStop, size/2, size/2, size*0.5*outerStop);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.4, 'rgba(255,255,255,0.45)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,size,size);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

  subject: window.SUBJECT,
});
